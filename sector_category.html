    <script>

        // Plotlyラッパー（etf.htmlと同一）
        const Plot = ({ data, layout, config, style, useResizeHandler }) => {
            const divRef = useRef(null);

            useEffect(() => {
                if (divRef.current && window.Plotly) Plotly.react(divRef.current, data, layout, config);
            }, [data, layout, config]);

            useEffect(() => {
                let resizeObserver;
                if (useResizeHandler && divRef.current && window.Plotly) {
                    resizeObserver = new ResizeObserver(() => window.Plotly.Plots.resize(divRef.current));
                    resizeObserver.observe(divRef.current);
                }
                return () => resizeObserver && resizeObserver.disconnect();
            }, [useResizeHandler]);

            useEffect(() => () => divRef.current && window.Plotly && Plotly.purge(divRef.current), []);

            return <div ref={divRef} style={style} />;
        };

        // 全セクター相対パフォーマンス + ランキング（etf.html から移植）
        const FullSectorChart = ({ processedData, period }) => {
            const filteredRanking = useMemo(() => {
                if (!processedData) return [];
                return processedData.ranking.filter(r => !FULL_RANKING_HIDDEN.has(r.symbol));
            }, [processedData]);

            const [visibleSectors, setVisibleSectors] = useState(FULL_RANKING_DEFAULT_VISIBLE);

            const toggleSector = useCallback((name) => {
                setVisibleSectors(prev => {
                    const next = new Set(prev);
                    next.has(name) ? next.delete(name) : next.add(name);
                    return next;
                });
            }, []);

            const showTop7 = useCallback(() => {
                if (!filteredRanking.length) return;
                const top7 = filteredRanking.slice(0, 7).map(r => r.name);
                setVisibleSectors(new Set([...top7, NIKKEI_NAME]));
            }, [filteredRanking]);

            const showBottom7 = useCallback(() => {
                if (!filteredRanking.length) return;
                const n = filteredRanking.length;
                const bottom7 = filteredRanking.slice(Math.max(0, n - 7)).map(r => r.name);
                setVisibleSectors(new Set([...bottom7, NIKKEI_NAME]));
            }, [filteredRanking]);

            const maxAbsPerf = useMemo(() => {
                if (!filteredRanking.length) return 1;
                const max = Math.max(...filteredRanking.map(r => Math.abs(r.performance)));
                return max === 0 ? 1 : max;
            }, [filteredRanking]);

            const copySummary = useCallback(() => {
                if (!filteredRanking.length || !processedData) return;
                const top3 = filteredRanking.slice(0, 3);
                const worst = filteredRanking[filteredRanking.length - 1];
                const text = `【セクター資金流入分析サマリー】\n基準日: ${processedData.endDate}（期間: ${period}）\n\n🚀 アウトパフォーム・トップ（資金流入中）\n1位: ${top3[0]?.name} (+${top3[0]?.performance.toFixed(2)}%)\n2位: ${top3[1]?.name} (+${top3[1]?.performance.toFixed(2)}%)\n3位: ${top3[2]?.name} (+${top3[2]?.performance.toFixed(2)}%)\n\n📉 アンダーパフォーム・ワースト（資金流出中）\n・${worst?.name} (${worst?.performance.toFixed(2)}%)\n\n※TOPIX(1306.T)を基準とした相対騰落率を算出。`;
                navigator.clipboard.writeText(text).then(() => alert('サマリーをクリップボードにコピーしました。'));
            }, [filteredRanking, processedData, period]);

            const chartTraces = useMemo(() => {
                if (!processedData) return [];
                return filteredRanking.map((item, i) => {
                    const sym = processedData.nameToSymbol?.[item.name] || '';
                    const isNikkei = item.name === NIKKEI_NAME;
                    const isETF = sym.endsWith('.T') || sym.startsWith('^') || sym.includes('=');
                    return {
                        x: processedData.timeSeries.map(d => d.date),
                        y: processedData.timeSeries.map(d => d[item.name] ?? null),
                        type: 'scatter', mode: 'lines', name: item.name,
                        visible: visibleSectors.has(item.name),
                        line: {
                            color: isNikkei ? NIKKEI_COLOR : COLORS[i % COLORS.length],
                            width: 2,
                            dash: isNikkei ? 'dot' : 'solid',
                        },
                        hovertemplate: (isETF && sym)
                            ? `<b>%{fullData.name}</b> <span style="color:#7C4DFF;font-size:10px">(${sym})</span><br>%{y:.2f}%<extra></extra>`
                            : '<b>%{fullData.name}</b><br>%{y:.2f}%<extra></extra>',
                    };

                });
            }, [filteredRanking, processedData, visibleSectors]);

            if (!processedData || !filteredRanking.length) return null;

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <h3 className="text-[13px] font-bold text-[#7C4DFF] mb-3 flex items-center gap-2">
                        <Icon name="PieChart" className="text-[#7C4DFF]" size={14} />
                        相対パフォーマンス推移（全セクター / vs TOPIX）
                        <FullSectorLegend />
                        <div className="flex gap-1.5 ml-auto">
                            <button onClick={showTop7} className="text-xs px-3 py-1 rounded-full bg-white border border-[#7C4DFF] text-[#7C4DFF] hover:bg-[#7C4DFF] hover:text-white font-bold transition-colors shadow-sm">▲ 上位7</button>
                            <button onClick={showBottom7} className="text-xs px-3 py-1 rounded-full bg-white border border-[#7C4DFF] text-[#7C4DFF] hover:bg-[#7C4DFF] hover:text-white font-bold transition-colors shadow-sm">▼ 下位7</button>
                        </div>
                    </h3>
                    <div className="flex gap-4 h-[440px]">
                        {/* 左列：チャート + 凡例 */}
                        <div className="w-[58%] h-full flex flex-col">
                            <div className="flex-1 min-h-0 relative z-10">
                                <Plot
                                    data={chartTraces}
                                    layout={{
                                        autosize: true,
                                        margin: { t: 5, r: 5, l: 40, b: 10 },
                                        dragmode: 'pan',
                                        xaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            rangebreaks: processedData.isIntraday ? [
                                                { bounds: ["sat","mon"] },
                                                { bounds: [15.5,9], pattern:"hour" },
                                                { bounds: [11.5,12.5], pattern:"hour" }
                                            ] : [{ bounds: ["sat","mon"] }],
                                        },
                                        yaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            ticksuffix: '%',
                                            zeroline: true, zerolinecolor: '#0f172a', zerolinewidth: 2,
                                        },
                                        paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                                        showlegend: false,
                                        hovermode: 'closest',
                                    }}
                                    config={{ responsive: true, scrollZoom: true, displayModeBar: false }}
                                    style={{ width: '100%', height: '100%' }}
                                    useResizeHandler={true}
                                />
                            </div>
                            {/* 凡例 */}
                            <div className="flex flex-wrap gap-x-2 gap-y-0.5 justify-start mt-2 pt-2 border-t border-slate-100">
                                {filteredRanking.map((item, i) => (
                                    <div key={item.name}
                                        className={`flex items-center gap-1 cursor-pointer select-none transition-opacity ${visibleSectors.has(item.name) ? 'hover:opacity-70' : 'opacity-25'}`}
                                        onClick={() => toggleSector(item.name)}
                                    >
                                        <div className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: item.name === NIKKEI_NAME ? NIKKEI_COLOR : COLORS[i % COLORS.length] }} />
                                        <span className="text-[9px] text-slate-600">{item.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 右列：セクターランキング */}
                        <div className="w-[42%] h-full flex flex-col">
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1 min-h-0">
                                {filteredRanking.map((item, index) => {
                                    const isPositive = item.performance >= 0;
                                    return (
                                        <div key={item.symbol} className="relative group h-8 flex items-center">
                                            <div className="absolute inset-0 bg-slate-50 border border-slate-100/50 rounded-lg overflow-hidden flex">
                                                <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-200 z-10"></div>
                                                <div className="w-1/2 flex justify-end">
                                                    {!isPositive && (
                                                        <div className="h-full bg-rose-500/20 border-r-2 border-rose-500 transition-all duration-500 ease-out"
                                                            style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                    )}
                                                </div>
                                                <div className="w-1/2 flex justify-start">
                                                    {isPositive && (
                                                        <div className="h-full bg-emerald-500/20 border-l-2 border-emerald-500 transition-all duration-500 ease-out"
                                                            style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center w-full text-xs z-20 relative px-2">
                                                <div className="flex items-center gap-1">
                                                    <div className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: item.name === NIKKEI_NAME ? NIKKEI_COLOR : COLORS[index % COLORS.length] }} />
                                                    <span className="font-bold truncate max-w-[90px] text-slate-700 text-[11px]" title={item.name}>{item.name}</span>
                                                </div>
                                                <span className={cn("font-mono font-bold text-[11px]", isPositive ? "text-emerald-600" : "text-rose-600")}>
                                                    {isPositive ? '+' : ''}{item.performance.toFixed(2)}%
                                                </span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="mt-2 pt-2 border-t border-slate-200 shrink-0">
                                <button
                                    onClick={copySummary}
                                    className="w-full flex items-center justify-center gap-2 bg-[#7C4DFF] hover:bg-[#651FFF] text-white py-2 rounded-lg font-bold text-xs transition-all shadow-sm"
                                >
                                    <Icon name="Copy" size={13} />
                                    サマリーをコピー
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // カテゴリ詳細モーダルコンポーネント（全画面オーバーレイ）
        const InfoTooltip = ({ categoryId }) => {
            const [open, setOpen] = useState(false);
            const details = CATEGORY_DETAILS[categoryId] || [];
            const categoryLabel = (CATEGORIES.find(c => c.id === categoryId) || {}).label || categoryId;
            const TYPE_STYLE = {
                'ETF':      { bg: 'bg-purple-100', text: 'text-purple-700', label: 'ETF' },
                'バスケット': { bg: 'bg-slate-100',  text: 'text-slate-600',  label: 'バスケット' },
                '指数':      { bg: 'bg-blue-50',    text: 'text-blue-600',   label: '指数' },
            };

            useEffect(() => {
                document.body.style.overflow = open ? 'hidden' : '';
                return () => { document.body.style.overflow = ''; };
            }, [open]);

            return (
                <span className="inline-flex items-center">
                    {/* トリガーアイコン */}
                    <span
                        className="cursor-pointer text-slate-300 hover:text-[#7C4DFF] transition-colors"
                        onClick={(e) => { e.stopPropagation(); setOpen(true); }}
                    >
                        <Icon name="HelpCircle" size={13} />
                    </span>
                    {open && (
                        <div
                            className="fixed inset-0 z-[9999] flex items-center justify-center p-4"
                            style={{ backgroundColor: 'rgba(15,23,42,0.55)' }}
                            onClick={() => setOpen(false)}
                        >
                            <div
                                className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col"
                                style={{ boxShadow: '0 25px 60px rgba(0,0,0,0.25)' }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* モーダルヘッダー */}
                                <div className="flex justify-between items-center px-6 py-4 border-b border-slate-100">
                                    <h3 className="font-bold text-slate-800 text-base flex items-center gap-2">
                                        <Icon name="HelpCircle" size={18} className="text-[#7C4DFF]" />
                                        {categoryLabel}　構成セクター一覧
                                    </h3>
                                    <button
                                        onClick={() => setOpen(false)}
                                        className="text-slate-400 hover:text-slate-700 p-1.5 rounded-lg hover:bg-slate-100 transition-colors"
                                    >
                                        <Icon name="X" size={18} />
                                    </button>
                                </div>
                                {/* テーブル本体（スクロール可） */}
                                <div className="overflow-y-auto flex-1 px-6 py-3">
                                    <table className="w-full border-collapse text-sm">
                                        <thead className="sticky top-0 bg-white">
                                            <tr className="border-b-2 border-slate-100">
                                                <th className="text-left py-2 pr-3 font-bold text-slate-500 w-[22%]">セクター</th>
                                                <th className="text-center py-2 pr-3 font-bold text-slate-500 w-[12%]">種別</th>
                                                <th className="text-left py-2 font-bold text-slate-500">コード / 構成銘柄</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {details.map((d, i) => {
                                                const ts = TYPE_STYLE[d.type] || TYPE_STYLE['指数'];
                                                return (
                                                    <tr key={i} className="border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors">
                                                        <td className="py-2.5 pr-3 font-semibold text-slate-700">{d.name}</td>
                                                        <td className="py-2.5 pr-3 text-center">
                                                            <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-bold ${ts.bg} ${ts.text}`}>
                                                                {ts.label}
                                                            </span>
                                                        </td>
                                                        <td className="py-2.5 text-slate-500 text-xs leading-relaxed">
                                                            {d.code || d.stocks || ''}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                                {/* フッター */}
                                <div className="px-6 py-3 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
                                    <p className="text-xs text-slate-400">
                                        🧺 バスケット = 時価総額上位銘柄の等加重平均で合成した仮想指数　／　背景クリックで閉じる
                                    </p>
                                    {categoryId === 'scale' && (
                                        <p className="text-xs text-amber-600 mt-1 font-semibold">
                                            ⚠️ このチャートは例外です：TOPIXで割り返しを行わず、期間開始時点を基準（0%）とした絶対値リターンを表示します。参考ライン（日経指数・TOPIX・NASDAQ先物・SP500先物・半導体ETF）も同様に絶対値表示です。
                                        </p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </span>
            );
        };

        // ── ランキングチャート用定数 ────────────────────────────────────────
        // 除外: TOPIX規模系・市場指標・旧コード・複合ETF（バスケットで代替済み）
        const EXCLUDE_FROM_SECTOR_RANKING = new Set([
            'TOPIX Core30','JPX400','グロース250',
            'NASDAQ先物','SP500先物',
            '日経指数','日経225ETF','米国債10年','GX日本成長',
            '銀行','半導体',
            '食品','素材・化学','自動車・輸送機',
            '鉄鋼・非鉄','商社・卸売','運輸・物流','金融（除く銀行）',
        ]);
        // FullSectorChart 用：全体チャートから除外するシンボルキー
        const FULL_RANKING_HIDDEN = new Set([
            '1311.T', '1591.T', '2516.T',
            'NQ=F', 'ES=F', 'YM=F',
            '1618.T', '200A.T', '^TNX',
            '機械', '1623.T', '1632.T', '1631.T', '213A.T',
        ]);

        // FullSectorChart デフォルト表示セクター
        const FULL_RANKING_DEFAULT_VISIBLE = new Set([
            '不動産', '銀行業', '鉄鋼', '非鉄金属',
            '石油・石炭', '卸売業', '半導体ETF', '日経指数'
        ]);

        const NIKKEI_NAME  = '日経指数';
        const NIKKEI_COLOR = '#1e293b';  // 黒（日経指数用）

        // ── 上位 / 下位 セクターランキングチャート ──────────────────────────
        const SectorRankingChart = ({ processedData, type }) => {
            const isTop = type === 'top';

            const sectorOnly = useMemo(() => {
                if (!processedData) return [];
                return processedData.ranking.filter(r => !EXCLUDE_FROM_SECTOR_RANKING.has(r.name));
            }, [processedData]);

            const selected = useMemo(() => {
                if (isTop) return sectorOnly.filter(r => r.performance > 0).slice(0, 7);
                return [...sectorOnly].slice(-7).reverse(); // 下位7を worst-first で表示
            }, [sectorOnly, isTop]);

            const nikkeiEntry = useMemo(() =>
                processedData?.ranking.find(r => r.name === NIKKEI_NAME),
            [processedData]);

            const maxAbsPerf = useMemo(() => {
                if (!selected.length) return 1;
                const max = Math.max(...selected.map(r => Math.abs(r.performance)));
                return max === 0 ? 1 : max;
            }, [selected]);

            const noData = !processedData || selected.length === 0;

            // トグル状態（クリックで表示/非表示）
            const [hiddenTraces, setHiddenTraces] = useState(new Set());
            const toggleTrace = useCallback((name) => {
                setHiddenTraces(prev => { const next = new Set(prev); next.has(name) ? next.delete(name) : next.add(name); return next; });
            }, []);

            const chartTraces = useMemo(() => {
                if (!processedData || !selected.length) return [];
                const traces = selected.map((item, i) => {
                    const code = NAME_TO_ETF_CODE[item.name];
                    return {
                        x: processedData.timeSeries.map(d => d.date),
                        y: processedData.timeSeries.map(d => d[item.name] ?? null),
                        type: 'scatter', mode: 'lines', name: item.name,
                        line: { color: COLORS[i % COLORS.length], width: 1.5 },
                        hovertemplate: code
                            ? `<b>%{fullData.name}</b> <span style="color:#7C4DFF;font-size:10px">(${code})</span><br>%{y:.2f}%<extra></extra>`
                            : '<b>%{fullData.name}</b><br>%{y:.2f}%<extra></extra>',
                    };
                });
                if (nikkeiEntry) traces.push({
                    x: processedData.timeSeries.map(d => d.date),
                    y: processedData.timeSeries.map(d => d[NIKKEI_NAME] ?? null),
                    type: 'scatter', mode: 'lines', name: NIKKEI_NAME,
                    line: { color: NIKKEI_COLOR, width: 2, dash: 'dot' },
                    hovertemplate: `<b>%{fullData.name}</b> <span style="color:#7C4DFF;font-size:10px">(^N225)</span><br>%{y:.2f}%<extra></extra>`,
                });
                return traces;
            }, [processedData, selected, nikkeiEntry]);

            const borderClass = isTop ? 'border-emerald-200' : 'border-rose-200';
            const title = isTop
                ? '▲ TOP 7 アウトパフォーマー（TOPIX超過）＋ 日経平均'
                : '▼ BOTTOM 7 アンダーパフォーマー（TOPIX超過）＋ 日経平均';

            return (
                <div className={`bg-white rounded-xl shadow-sm border p-4 ${borderClass}`}>
                    <h3 className="text-[13px] font-bold text-[#7C4DFF] mb-3 flex items-center gap-2">
                        <Icon name="PieChart" className="text-[#7C4DFF]" size={14} />
                        {title}
                    </h3>
                    <div className="flex gap-4 h-[280px]">
                        {/* 左：チャート */}
                        <div className="w-1/2 h-full relative z-10">
                            {noData ? (
                                <div className="flex items-center justify-center h-full text-xs text-slate-400">データなし</div>
                            ) : (
                                <Plot
                                    data={chartTraces.map(t => ({ ...t, visible: !hiddenTraces.has(t.name) }))}
                                    layout={{
                                        autosize: true,
                                        margin: { t: 5, r: 5, l: 35, b: 10 },
                                        dragmode: 'pan',
                                        xaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            rangebreaks: processedData.isIntraday ? [
                                                { bounds: ["sat","mon"] },
                                                { bounds: [15.5,9], pattern:"hour" },
                                                { bounds: [11.5,12.5], pattern:"hour" }
                                            ] : [{ bounds: ["sat","mon"] }],
                                        },
                                        yaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            ticksuffix: '%',
                                            zeroline: true, zerolinecolor: '#0f172a', zerolinewidth: 1.5,
                                        },
                                        paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                                        showlegend: false, hovermode: 'closest',
                                    }}
                                    config={{ responsive: true, scrollZoom: true, displayModeBar: false }}
                                    style={{ width: '100%', height: '100%' }}
                                    useResizeHandler={true}
                                />
                            )}
                        </div>
                        {/* 右：ランキング */}
                        <div className="w-1/2 h-full overflow-y-auto custom-scrollbar pr-1 relative z-0">
                            {noData ? (
                                <div className="flex items-center justify-center h-full text-xs text-slate-400">データなし</div>
                            ) : (
                                <div className="space-y-1.5">
                                    {selected.map((item, index) => {
                                        const isPositive = item.performance >= 0;
                                        return (
                                            <div key={item.symbol || item.name} className="relative group h-8 flex items-center">
                                                <div className="absolute inset-0 bg-slate-50 border border-slate-100/50 rounded-lg overflow-hidden flex">
                                                    <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-200 z-10"></div>
                                                    <div className="w-1/2 flex justify-end">
                                                        {!isPositive && (
                                                            <div className="h-full bg-rose-500/20 border-r-2 border-rose-500 transition-all duration-500 ease-out"
                                                                style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                        )}
                                                    </div>
                                                    <div className="w-1/2 flex justify-start">
                                                        {isPositive && (
                                                            <div className="h-full bg-emerald-500/20 border-l-2 border-emerald-500 transition-all duration-500 ease-out"
                                                                style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center w-full text-xs z-20 relative px-2">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-slate-400 w-4 text-right font-bold">{index+1}</span>
                                                        <div className="w-2 h-2 rounded-full shrink-0"
                                                            style={{ backgroundColor: COLORS[index % COLORS.length] }} />
                                                        <span className="font-bold truncate max-w-[100px] text-slate-700" title={item.name}>{item.name}</span>
                                                    </div>
                                                    <span className={cn("font-mono font-bold", isPositive ? "text-emerald-600" : "text-rose-600")}>
                                                        {isPositive ? '+' : ''}{item.performance.toFixed(2)}%
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                    {/* カスタム凡例（色丸・クリックで表示/非表示） */}
                    {!noData && (
                        <div className="flex flex-wrap gap-x-3 gap-y-0.5 justify-center mt-2">
                            {selected.map((item, i) => (
                                <div key={item.name}
                                    className={`flex items-center gap-1 cursor-pointer select-none transition-opacity ${hiddenTraces.has(item.name) ? 'opacity-25' : 'hover:opacity-70'}`}
                                    onClick={() => toggleTrace(item.name)}
                                >
                                    <div className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: COLORS[i % COLORS.length] }} />
                                    <span className="text-[9px] text-slate-600">{item.name}</span>
                                </div>
                            ))}
                            {nikkeiEntry && (
                                <div

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // 期間オプション（etf.htmlと同一）

        // 7分類とその対応セクター名（etf_data_manager.pyの出力キーに完全対応）

        const CATEGORIES = [

        // カテゴリ別チャート＋ランキングコンポーネント
        const CategorySection = ({ category, processedData }) => {
            const isAbsolute = !!category.absoluteMode;

            // 絶対値モード用の参考ライン定義（catRankingより先に定義）
            const ABS_REF_LINES = isAbsolute ? [
                { name: 'TOPIX',      color: '#94a3b8', width: 1.5, dash: 'solid',  code: '1306.T' },
                { name: '日経指数',   color: '#1e293b', width: 2,   dash: 'dot',    code: '^N225' },
                { name: 'NASDAQ先物', color: '#2563eb', width: 1.5, dash: 'solid',  code: 'NQ=F' },
                { name: 'SP500先物',  color: '#dc2626', width: 1.5, dash: 'solid',  code: 'ES=F' },
                { name: 'DOW先物',    color: '#16a34a', width: 1.5, dash: 'solid',  code: 'YM=F' },
                { name: '半導体ETF',  color: '#d97706', width: 1.5, dash: 'dash',   code: '2644.T' },
            ] : [];

            const catRanking = useMemo(() => {
                if (!processedData) return [];
                const src = isAbsolute ? processedData.absoluteRanking : processedData.ranking;
                const filtered = src.filter(r => category.sectors.includes(r.name));

                // 同名ETF・バスケット重複排除: ETF優先（symbol !== name がETF）
                const nameMap = new Map();
                filtered.forEach(r => {
                    const existing = nameMap.get(r.name);
                    if (!existing || (existing.symbol === existing.name && r.symbol !== r.name)) {
                        nameMap.set(r.name, r);
                    }
                });
                const deduped = [...nameMap.values()].sort((a, b) => b.performance - a.performance);

                if (!isAbsolute) return deduped;

                // 絶対値モード: 参考ラインもランキングに追加
                const refEntries = [];
                ABS_REF_LINES.forEach(ref => {
                    if (ref.name === 'TOPIX') {
                        const latest = processedData.absoluteTimeSeries?.[processedData.absoluteTimeSeries.length - 1];
                        if (latest?.TOPIX !== undefined) {
                            refEntries.push({ symbol: '1306.T', name: 'TOPIX', performance: latest.TOPIX });
                        }
                    } else {
                        const found = src.find(r => r.name === ref.name);
                        if (found) refEntries.push(found);
                    }
                });
                return [...deduped, ...refEntries].sort((a, b) => b.performance - a.performance);
            }, [processedData, category, isAbsolute]);

            const maxAbsPerf = useMemo(() => {
                if (!catRanking.length) return 1;
                const max = Math.max(...catRanking.map(r => Math.abs(r.performance)));
                return max === 0 ? 1 : max;
            }, [catRanking]);

            // 日経平均を追加（市場環境カテゴリは既に含むので重複除外、絶対値モードは専用ラインで処理）
            const shouldAddNikkei = !isAbsolute && !category.sectors.includes(NIKKEI_NAME);
            const nikkeiEntry = useMemo(() =>
                processedData?.ranking.find(r => r.name === NIKKEI_NAME),
            [processedData]);

            const noData = category.sectors.length === 0 || catRanking.length === 0;

            // トグル状態（クリックで表示/非表示）
            const [hiddenTraces, setHiddenTraces] = useState(new Set());
            const toggleTrace = useCallback((name) => {
                setHiddenTraces(prev => { const next = new Set(prev); next.has(name) ? next.delete(name) : next.add(name); return next; });
            }, []);

            const chartData = useMemo(() => {
                if (!processedData) return [];
                const ts = isAbsolute ? processedData.absoluteTimeSeries : processedData.timeSeries;
                const traces = catRanking.map((item, i) => {
                    const code = NAME_TO_ETF_CODE[item.name];
                    return {
                        x: ts.map(d => d.date),
                        y: ts.map(d => d[item.name] ?? null),
                        type: 'scatter', mode: 'lines', name: item.name,
                        visible: !hiddenTraces.has(item.name),
                        line: { color: COLORS[i % COLORS.length], width: 2 },
                        hovertemplate: code
                            ? `<b>%{fullData.name}</b> <span style="color:#7C4DFF;font-size:10px">(${code})</span><br>%{y:.2f}%<extra></extra>`
                            : '<b>%{fullData.name}</b><br>%{y:.2f}%<extra></extra>',
                    };
                });
                // 絶対値モード: 参考ライン追加
                if (isAbsolute) {
                    ABS_REF_LINES.forEach(ref => {
                        traces.push({
                            x: ts.map(d => d.date),
                            y: ts.map(d => d[ref.name] ?? null),
                            type: 'scatter', mode: 'lines', name: ref.name,
                            visible: !hiddenTraces.has(ref.name),
                            line: { color: ref.color, width: ref.width, dash: ref.dash },
                            hovertemplate: `<b>%{fullData.name}</b> <span style="color:#64748b;font-size:10px">(${ref.code})</span><br>%{y:.2f}%<extra></extra>`,
                        });
                    });
                }
                // 通常モード: 日経平均ライン追加
                if (shouldAddNikkei && nikkeiEntry) {
                    const ts2 = processedData.timeSeries;
                    traces.push({
                        x: ts2.map(d => d.date),
                        y: ts2.map(d => d[NIKKEI_NAME] ?? null),
                        type: 'scatter', mode: 'lines', name: NIKKEI_NAME,
                        visible: !hiddenTraces.has(NIKKEI_NAME),
                        line: { color: NIKKEI_COLOR, width: 2, dash: 'dot' },
                        hovertemplate: `<b>%{fullData.name}</b> <span style="color:#7C4DFF;font-size:10px">(^N225)</span><br>%{y:.2f}%<extra></extra>`,
                    });
                }
                return traces;
            }, [processedData, catRanking, hiddenTraces, isAbsolute, shouldAddNikkei, nikkeiEntry]);

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                    <h3 className="text-[13px] font-bold text-[#7C4DFF] mb-3 flex items-center gap-2">
                        <Icon name="PieChart" className="text-[#7C4DFF]" size={14} />
                        {category.label}
                        <InfoTooltip categoryId={category.id} />
                    </h3>
                    <div className="flex gap-4 h-[280px]">
                        {/* 左列：チャート */}
                        <div className="w-1/2 h-full relative z-10">
                            {noData ? (
                                <div className="flex items-center justify-center h-full text-xs text-slate-400">
                                    データなし（未対応ETF）
                                </div>
                            ) : (
                                <Plot
                                    data={chartData}
                                    layout={{
                                        autosize: true,
                                        margin: { t: 5, r: 5, l: 35, b: 10 },
                                        dragmode: 'pan',
                                        xaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            rangebreaks: processedData.isIntraday ? [
                                                { bounds: ["sat","mon"] },
                                                { bounds: [15.5,9], pattern:"hour" },
                                                { bounds: [11.5,12.5], pattern:"hour" }
                                            ] : [{ bounds: ["sat","mon"] }],
                                        },
                                        yaxis: {
                                            showgrid: true, gridcolor: '#e2e8f0',
                                            tickfont: { color: '#64748b', size: 9 },
                                            ticksuffix: '%',
                                            zeroline: true, zerolinecolor: '#0f172a', zerolinewidth: 1.5,

                                        paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
                                        showlegend: false,
                                        hovermode: 'closest',
                                    }}
                                    config={{ responsive: true, scrollZoom: true, displayModeBar: false }}
                                    style={{ width: '100%', height: '100%' }}
                                    useResizeHandler={true}
                                />
                            )}
                        </div>

                        {/* 右列：ランキング */}
                        <div className="w-1/2 h-full overflow-y-auto custom-scrollbar pr-1 relative z-0">
                            {noData ? (
                                <div className="flex items-center justify-center h-full text-xs text-slate-400">
                                    データなし
                                </div>
                            ) : (
                                <div className="space-y-1.5">
                                    {catRanking.map((item, index) => {
                                        const isPositive = item.performance >= 0;
                                        const refLine = isAbsolute ? ABS_REF_LINES.find(r => r.name === item.name) : null;
                                        const dotColor = refLine ? refLine.color : COLORS[index % COLORS.length];
                                        return (
                                            <div key={item.symbol} className="relative group h-8 flex items-center">
                                                <div className="absolute inset-0 bg-slate-50 border border-slate-100/50 rounded-lg overflow-hidden flex">
                                                    <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-200 z-10"></div>
                                                    <div className="w-1/2 flex justify-end">
                                                        {!isPositive && (
                                                            <div className="h-full bg-rose-500/20 border-r-2 border-rose-500 transition-all duration-500 ease-out"
                                                                style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                        )}
                                                    </div>
                                                    <div className="w-1/2 flex justify-start">
                                                        {isPositive && (
                                                            <div className="h-full bg-emerald-500/20 border-l-2 border-emerald-500 transition-all duration-500 ease-out"
                                                                style={{ width: `${(Math.abs(item.performance)/maxAbsPerf)*100}%` }} />
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center w-full text-xs z-20 relative px-2">
                                                    <div className="flex items-center gap-2">
                                                        <div className="w-2 h-2 rounded-full shrink-0"
                                                            style={{ backgroundColor: dotColor }} />
                                                        <span className="font-bold truncate max-w-[100px] text-slate-700" title={item.name}>{item.name}</span>
                                                    </div>
                                                    <span className={cn("font-mono font-bold", isPositive ? "text-emerald-600" : "text-rose-600")}>
                                                        {isPositive ? '+' : ''}{item.performance.toFixed(2)}%
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                    {/* カスタム凡例（色丸・クリックで表示/非表示） */}
                    {!noData && (
                        <div className="flex flex-wrap gap-x-3 gap-y-0.5 justify-center mt-2">
                            {catRanking.map((item, i) => {
                                const refLineL = isAbsolute ? ABS_REF_LINES.find(r => r.name === item.name) : null;
                                const legendColor = refLineL ? refLineL.color : COLORS[i % COLORS.length];
                                return (
                                    <div key={item.name}
                                        className={`flex items-center gap-1 cursor-pointer select-none transition-opacity ${hiddenTraces.has(item.name) ? 'opacity-25' : 'hover:opacity-70'}`}
                                        onClick={() => toggleTrace(item.name)}
                                    >
                                        <div className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: legendColor }} />
                                        <span className="text-[9px] text-slate-600">{item.name}</span>

                            {shouldAddNikkei && nikkeiEntry && (
                                <div
                                    className={`flex items-center gap-1 cursor-pointer select-none transition-opacity ${hiddenTraces.has(NIKKEI_NAME) ? 'opacity-25' : 'hover:opacity-70'}`}
                                    onClick={() => toggleTrace(NIKKEI_NAME)}
                                >
                                    <div className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: NIKKEI_COLOR }} />
                                    <span className="text-[9px] text-slate-700 font-medium">{NIKKEI_NAME}</span>
                                </div>
                            )}

                    )}
                </div>
            );
        };

        const App = () => {
            const [period, setPeriod] = useState('1d');
            const [rawDaily, setRawDaily] = useState(null);
            const [rawIntraday, setRawIntraday] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            // データ取得（useCallbackで安定参照）
            const fetchRawData = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const [resDaily, resIntraday] = await Promise.all([
                        fetch(`./data/etf_data.json?t=${new Date().getTime()}`),
                        fetch(`./data/etf_intraday_data.json?t=${new Date().getTime()}`).catch(() => null)
                    ]);

                    if (!resDaily.ok) {
                        if (resDaily.status === 404) {
                            throw new Error("データファイル(etf_data.json)が未生成です。GitHub Actionsの完了をお待ちください。");
                        }
                        throw new Error(`データ読み込み失敗: ${resDaily.status} ${resDaily.statusText}`);
                    }
                    const jsonDaily = await resDaily.json();
                    if (!jsonDaily.dates || jsonDaily.dates.length === 0) {
                        throw new Error("データが空です。");
                    }
                    setRawDaily(jsonDaily);

                    if (resIntraday && resIntraday.ok) {
                        const jsonIntraday = await resIntraday.json();
                        setRawIntraday(jsonIntraday);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }, []);

            // 初回取得
            useEffect(() => { fetchRawData(); }, [fetchRawData]);

            // 自動更新: 前場(9:00-11:30) / 後場(12:30-15:30) の間、15分毎に再取得
            useEffect(() => {
                const interval = setInterval(() => {
                    const jst = new Date(Date.now() + 9 * 3600 * 1000);
                    const t = jst.getUTCHours() * 60 + jst.getUTCMinutes();
                    const inSession = (t >= 540 && t <= 690) || (t >= 750 && t <= 930);
                    if (inSession) fetchRawData();
                }, 15 * 60 * 1000);
                return () => clearInterval(interval);
            }, [fetchRawData]);

            // データ加工（etf.htmlと同一）
            const processedData = useMemo(() => {
                const isIntraday = ['1d', '2d', '3d', '4d', '5d', '6d', '7d', '8d', '9d', '10d', '14d'].includes(period);
                const rawData = (isIntraday && rawIntraday) ? rawIntraday : rawDaily;
                if (!rawData) return null;

                const { dates, prices, benchmark, sectors } = rawData;
                const L = dates.length;
                let startIndex = 0;

                if (isIntraday) {
                    const calendarDates = [...new Set(dates.map(d => d.split(' ')[0]))];
                    const daysAgo = parseInt(period.replace('d', '')) || 1;
                    const targetDateStr = calendarDates[Math.max(0, calendarDates.length - daysAgo)];
                    startIndex = dates.findIndex(d => d.startsWith(targetDateStr));
                    if (startIndex === -1) startIndex = 0;
                } else {
                    if (period.endsWith('d')) {
                        const days = parseInt(period.replace('d', ''), 10);
                        startIndex = Math.max(0, L - (days + 1));
                    } else {
                        const latestDateStr = dates[L - 1];
                        const today = latestDateStr ? new Date(latestDateStr) : new Date();
                        const targetDates = {
                            '1mo': 30, '2mo': 60, '3mo': 90, '6mo': 180, '1y': 365
                        };
                        const daysAgo = targetDates[period] || 30;
                        const targetTimestamp = new Date(today.getTime() - daysAgo * 24 * 60 * 60 * 1000).getTime();

                        for (let i = L - 1; i >= 0; i--) {
                            const d = new Date(dates[i]).getTime();
                            if (d <= targetTimestamp) {
                                startIndex = i;
                                break;
                            }
                        }
                    }
                }

                const endIndex = L - 1;
                const bPrices = prices[benchmark];

                // UTC→JST変換（etf.htmlと同一）
                const toJST = (utcStr) => {
                    const d = new Date(utcStr.replace(' ', 'T') + ':00Z');
                    const j = new Date(d.getTime() + 9 * 3600 * 1000);
                    const p = n => String(n).padStart(2, '0');
                    return `${j.getUTCFullYear()}-${p(j.getUTCMonth()+1)}-${p(j.getUTCDate())} ${p(j.getUTCHours())}:${p(j.getUTCMinutes())}`;
                };

                const timeSeries = [];
                const absoluteTimeSeries = [];

                for (let i = startIndex; i <= endIndex; i++) {
                    const date = isIntraday ? toJST(dates[i]) : dates[i];
                    const bStart = bPrices[startIndex];
                    const bCurrent = bPrices[i];

                    if (!bStart || !bCurrent) continue;

                    const bReturn = (bCurrent / bStart) - 1;

                    // 相対リターン（TOPIX超過）
                    const point = { date };
                    point.TOPIX = bReturn * 100;

                    // 絶対リターン（TOPIX割り返しなし）
                    const absPoint = { date };
                    absPoint.TOPIX = bReturn * 100;  // TOPIXも絶対値として追加

                    Object.keys(sectors).forEach(symbol => {
                        const name = sectors[symbol];
                        const sPrices = prices[symbol];
                        if (!sPrices) return;

                        const sStart = sPrices[startIndex];
                        const sCurrent = sPrices[i];

                        if (sStart && sCurrent) {
                            const sReturn = (sCurrent / sStart) - 1;
                            point[name] = (sReturn - bReturn) * 100;  // 相対
                            absPoint[name] = sReturn * 100;             // 絶対
                        } else {
                            point[name] = 0;
                            absPoint[name] = 0;
                        }
                    });

                    timeSeries.push(point);
                    absoluteTimeSeries.push(absPoint);
                }

                const ranking = [];
                if (timeSeries.length > 0) {
                    const latest = timeSeries[timeSeries.length - 1];
                    Object.keys(sectors).forEach(symbol => {
                        const name = sectors[symbol];
                        if (latest[name] !== undefined) {
                            ranking.push({ symbol, name, performance: latest[name] });
                        }
                    });
                    ranking.sort((a, b) => b.performance - a.performance);
                }

                // 絶対値ランキング（規模別指数チャート用）
                const absoluteRanking = [];
                if (absoluteTimeSeries.length > 0) {
                    const latest = absoluteTimeSeries[absoluteTimeSeries.length - 1];
                    Object.keys(sectors).forEach(symbol => {
                        const name = sectors[symbol];
                        if (latest[name] !== undefined) {
                            absoluteRanking.push({ symbol, name, performance: latest[name] });
                        }
                    });
                    absoluteRanking.sort((a, b) => b.performance - a.performance);
                }

                // セクター名→シンボルの逆引きマップ（ランキングのホバー・バッジ表示用）
                const nameToSymbol = {};
                Object.keys(sectors).forEach(sym => { nameToSymbol[sectors[sym]] = sym; });

                return {
                    period,
                    isIntraday,
                    startDate: isIntraday ? toJST(dates[startIndex]) : dates[startIndex],
                    endDate: isIntraday ? toJST(dates[endIndex]) : dates[endIndex],
                    timeSeries,
                    absoluteTimeSeries,
                    ranking,
                    absoluteRanking,
                    nameToSymbol,
                };

            }, [rawDaily, rawIntraday, period]);

            return (
                <div className="flex flex-col min-h-screen bg-[#f8fafc]">
                    <main className="flex-1 overflow-auto p-4 md:p-6">
                        <div className="max-w-full mx-auto space-y-4">
                            {/* ヘッダー (header-hp 統一スタイル) */}
                            <header className="header-hp flex flex-col md:flex-row justify-between items-center py-3 px-6 mb-2">
                                <div className="flex items-center gap-3">
                                    <h1 className="text-xs font-bold text-[#7C4DFF]">セクター分類分析</h1>
                                    <a href="https://docs.google.com/spreadsheets/d/1ZT4RgT3KQUE-MXdLGHLliY0gF9EDcVEc6Ju4jsoORuc/edit?gid=1478282922#gid=1478282922" target="_blank" rel="noopener noreferrer" className="text-slate-400 text-xs font-medium ml-2 hover:text-[#7C4DFF] underline underline-offset-2">カテゴリ別TOPIX相対パフォーマンス</a>
                                </div>
                                <div className="flex items-center gap-4 text-xs mt-3 md:mt-0">
                                    {processedData && (
                                        <span className="text-slate-400 font-mono hidden sm:block">
                                            {processedData.startDate} 〜 {processedData.endDate}
                                        </span>
                                    )}
                                    <div className="flex items-center gap-2">
                                        <span className="text-slate-500 shrink-0">期間:</span>
                                        <select
                                            value={period}
                                            onChange={(e) => setPeriod(e.target.value)}
                                            className="bg-white border border-slate-200 rounded px-2 py-0.5 text-slate-700 focus:outline-none focus:border-[#7C4DFF] [&>option]:text-slate-800"
                                            disabled={loading}
                                        >
                                            {PERIODS.map(p => (
                                                <option key={p.value} value={p.value}>{p.label}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <button
                                        onClick={fetchRawData}
                                        className="bg-[#7C4DFF] text-white hover:bg-[#651FFF] font-bold px-3 py-1 rounded flex items-center gap-2 transition-colors shadow-sm"
                                        disabled={loading}
                                    >
                                        <Icon name="RefreshCw" size={14} className={cn(loading && "animate-spin")} />
                                        <span>更新</span>
                                    </button>
                                </div>
                            </header>

                            {/* ローディング */}
                            {loading && !processedData && (
                                <div className="flex justify-center items-center h-64">
                                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-[#7C4DFF]"></div>
                                </div>
                            )}

                            {/* エラー */}
                            {!loading && error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm">
                                    <strong>エラー:</strong> {error}
                                </div>
                            )}

                            {/* 全チャート一覧 */}
                            {!loading && processedData && processedData.timeSeries.length > 0 && (
                                <div className="flex flex-col gap-4 animate-fade-in">
                                    {/* 規模別指数（絶対値・最上部固定） */}
                                    {CATEGORIES.filter(c => c.id === 'scale').map(category => (
                                        <CategorySection
                                            key={category.id}
                                            category={category}
                                            processedData={processedData}
                                        />
                                    ))}
                                    {/* 全セクター相対パフォーマンス + ランキング（etf.htmlから移植） */}
                                    <FullSectorChart processedData={processedData} period={period} />
                                    {/* その他カテゴリ分類チャート */}
                                    {CATEGORIES.filter(c => c.id !== 'scale' && c.id !== 'market').map(category => (
                                        <CategorySection
                                            key={category.id}
                                            category={category}
                                            processedData={processedData}
                                        />
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
