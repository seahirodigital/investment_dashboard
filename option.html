<script>
    let storedData = {};
    let chartObj = { p1_total: null, p1_diff: null, p2_225_oi: null, p2_225_diff: null, trend: null };
    
    // UI Elements
    const logArea = document.getElementById('logArea');
    const statusText = document.getElementById('statusText');
    const btnFetch = document.getElementById('btnFetch');
    const loader = document.getElementById('loadingIndicator');
    const dateSelector = document.getElementById('dateSelector');

    // --- Core Functions ---
    
    function logMessage(msg, type='info') {
        const time = new Date().toLocaleTimeString();
        let color = type === 'error' ? 'text-rose-500' : (type === 'success' ? 'text-[#7C4DFF]' : 'text-slate-500');
        logArea.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
        logArea.scrollTop = logArea.scrollHeight;
        if(type === 'error' || type === 'success') {
            statusText.textContent = msg.substring(0, 30) + (msg.length>30?"...":"");
            statusText.className = `font-medium text-xs ${type === 'error' ? 'text-rose-500' : 'text-slate-400'}`; // Updated for white header
        }
    }

    // Initialize
    function init() {
        btnFetch.addEventListener('click', () => {
            initFirebase();
        });

        dateSelector.addEventListener('change', (e) => {
            renderAllCharts(e.target.value);
        });
        
        logMessage("システムを初期化しました", 'success');
        if (window.firebaseDb) {
            initFirebase();
        } else {
            window.addEventListener('firebase-ready', () => {
                initFirebase();
            });
            // タイムアウト設定：一定時間待ってもロードされない場合はエラーにする
            setTimeout(() => {
                if (!window.firebaseDb) {
                    logMessage("Firebaseの読み込みがタイムアウトしました。通信環境を確認してください。", 'error');
                }
            }, 5000);
        }
    }

    async function initFirebase() {
        try {
            logMessage("日付リスト読込中...", 'info');
            btnFetch.disabled = true;
            loader.classList.remove('hidden');

            const db = window.firebaseDb;
            if (!db) throw new Error("Firebase SDK not loaded");

            const optionCol = window.firebaseCollection(db, 'option_data');
            const snapshot = await window.firebaseGetDocs(optionCol);

            let dates = [];
            let bulkData = {};
            snapshot.forEach(doc => {
                dates.push(doc.id);
                bulkData[doc.id] = doc.data(); 
            });

            dates.sort().reverse();
            storedData = bulkData;

            updateDateSelector(dates);

            if (dates.length > 0) {
                const latestDate = dates[0];
                dateSelector.value = latestDate;
                renderAllCharts(latestDate);
                logMessage(`データの読込に成功しました`, 'success');
            } else {
                logMessage("データがありません", 'error');
            }
        } catch (err) {
             console.error("Firebase init error:", err);
             logMessage(`エラー: Firebaseの読み込みに失敗しました`, 'error');
             // 従来のJSONでのフォールバック
             fetchAndProcessData();
        } finally {
            btnFetch.disabled = false;
            loader.classList.add('hidden');
        }
    }

    async function fetchAndProcessData() {
        // Fallback functionality.
        try {
            btnFetch.disabled = true;
            loader.classList.remove('hidden');
            logMessage("ローカルJSONからデータを取得中...", 'info');
            
            const response = await fetch(`./data/option_history.json?t=${new Date().getTime()}`);
            if(!response.ok) throw new Error("データの取得に失敗しました");
            
            storedData = await response.json();
            
            logMessage(`データの読込に成功しました`, 'success');
            
            const dates = Object.keys(storedData).sort().reverse();
            updateDateSelector(dates);
            if(dates.length > 0) {
                const latestDate = dates[0];
                dateSelector.value = latestDate;
                renderAllCharts(latestDate);
            }

        } catch (error) {
            logMessage(`エラー: ${error.message} (本日のデータがまだ準備されていない可能性があります)`, 'error');
            console.error(error);
        } finally {
            btnFetch.disabled = false;
            loader.classList.add('hidden');
        }
    }

    // --- Chart Rendering ---

    function updateDateSelector(dates = []) {
        if (!dates || dates.length === 0) {
            dates = Object.keys(storedData).sort().reverse();
        }
        dateSelector.innerHTML = dates.map(d => `<option value="${d}">${d.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')}</option>`).join('');
        if(dates.length === 0) {
            dateSelector.innerHTML = '<option value="latest">データなし</option>';
        }
    }

    function renderAllCharts(dateKey) {
        if(!storedData[dateKey]) return;
        const d = storedData[dateKey];
        
        renderPurpose1Chart(d.p1);
        renderPurpose2Chart('chartPurpose2_225', 'p2_225', d.p2_225, '日経225');
        renderTrendChart();
    }

    function renderPurpose1Chart(dataObj) {
        // 1. Total OI Chart
        const ctxTotal = document.getElementById('chartPurpose1_Total').getContext('2d');
        if(chartObj.p1_total) chartObj.p1_total.destroy();
        
        chartObj.p1_total = new Chart(ctxTotal, {
            type: 'bar',
            data: {
                labels: dataObj.labels.length > 0 ? dataObj.labels : ['No Data'],
                datasets: [{
                    label: '当日建玉残高',
                    data: dataObj.totals.length > 0 ? dataObj.totals : [0],
                    backgroundColor: '#7C4DFF',
                    borderRadius: 4,
                    barPercentage: 0.25
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        display: true, 
                        labels: { color: '#64748b', boxWidth: 20, boxHeight: 6 } 
                    } 
                },
                scales: {
                    y: { 
                        grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' },
                        title: { display: true, text: '総建玉', color: '#475569'}
                    },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });

        // 2. Diff Chart
        const ctxDiff = document.getElementById('chartPurpose1_Diff').getContext('2d');
        if(chartObj.p1_diff) chartObj.p1_diff.destroy();

        chartObj.p1_diff = new Chart(ctxDiff, {
            type: 'bar',
            data: {
                labels: dataObj.labels.length > 0 ? dataObj.labels : ['No Data'],
                datasets: [{
                    label: '前日比 増減',
                    data: dataObj.differences.length > 0 ? dataObj.differences : [0],
                    backgroundColor: dataObj.differences.map(v => v >= 0 ? '#7C4DFF' : '#f43f5e'),
                    borderRadius: 4,
                    barPercentage: 0.25
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        display: true, 
                        labels: { color: '#64748b', boxWidth: 20, boxHeight: 6 } 
                    } 
                },
                scales: {
                    y: { 
                        grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' },
                        title: { display: true, text: '前日比', color: '#475569'}
                    },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });
    }

    function renderPurpose2Chart(canvasIdPrefix, targetChartObj, dataObj, titlePrefix) {
        let hasData = dataObj && dataObj.strikes && dataObj.strikes.length > 0;
        
        let minStrike = 45000;
        let maxStrike = 64000;
        
        const commonOptions = {
            responsive: true, maintainAspectRatio: false,
            indexAxis: 'y', // Horizontal bars
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let label = context.dataset.label || '';
                            let val = context.raw;
                            if(label.includes('プット') && !label.includes('Call - Put')) val = -val;
                            return `${label}: ${val > 0 ? '+':''}${val} 枚`;
                        }
                    }
                },
                zoom: {
                    zoom: {
                        wheel: { enabled: true },
                        drag: { enabled: false }, // マウスで範囲指定のズームを無効化
                        pinch: { enabled: true },
                        mode: 'y',
                    },
                    pan: { enabled: false } // カスタムイベントで逆向きでパンを実装するため標準をOFF
                }
            },
            scales: {
                x: { 
                    stacked: true, // これにより左右のバー位置がきれいにゼロから重なる（同じ垂直位置になる）
                    grid: { color: '#e2e8f0' },
                    ticks: { color: '#64748b' }
                },
                y: { 
                    stacked: true, // Xと同様
                    reverse: true, // 上から64000で並べる
                    min: minStrike,
                    max: maxStrike,
                    grid: { color: '#e2e8f0' },
                    ticks: { 
                        color: function(context) {
                            if (context.tick.value % 10000 === 0) return '#334155'; // 10000刻みを強調
                            return '#64748b';
                        },
                        font: function(context) {
                            if (context.tick.value % 10000 === 0) return { weight: 'bold' };
                            return { weight: 'normal' };
                        }
                    },
                    title: { display: true, text: '権利行使価格', color: '#475569'}
                }
            }
        };

        // カスタムパン（逆スクロール）用ヘルパー関数
        const attachCustomPan = (canvasElement, chartInstanceKey) => {
            let isDragging = false;
            let lastY = 0;
            canvasElement.onmousedown = (e) => { isDragging = true; lastY = e.clientY; };
            canvasElement.onmouseup = () => { isDragging = false; };
            canvasElement.onmouseleave = () => { isDragging = false; };
            canvasElement.onmousemove = (e) => {
                if(!isDragging) return;
                const chart = chartObj[chartInstanceKey];
                if(!chart) return;
                const deltaY = e.clientY - lastY;
                lastY = e.clientY;
                
                const scale = chart.scales.y;
                const range = scale.max - scale.min;
                // 移動範囲の計算 (ドラッグ方向を逆にする)
                const step = (range / scale.height) * deltaY; 
                
                chart.options.scales.y.min += step; // 通常は-, 逆にしたいので+
                chart.options.scales.y.max += step;
                chart.update('none');
            };
        };

        // 1. OI Chart (建玉)
        let net_oi = [];
        if(hasData) {
            net_oi = dataObj.c_oi.map((c, i) => c - dataObj.p_oi[i]);
        }

        const ctxOI = document.getElementById(`${canvasIdPrefix}_OI`).getContext('2d');
        if(chartObj[`${targetChartObj}_oi`]) chartObj[`${targetChartObj}_oi`].destroy();
        
        chartObj[`${targetChartObj}_oi`] = new Chart(ctxOI, {
            type: 'bar',
            data: {
                labels: hasData ? dataObj.strikes : ['No Data'],
                datasets: [
                    {
                        label: 'Call - Put 建玉', // 引き算結果
                        data: hasData ? net_oi : [0],
                        backgroundColor: hasData ? net_oi.map(v => v >= 0 ? '#7C4DFF' : '#f43f5e') : ['#7C4DFF'],
                        barPercentage: 0.8
                    }
                ]
            },
            options: {
                ...commonOptions,
                plugins: {
                    ...commonOptions.plugins,
                    legend: { position: 'top', labels: { color: '#64748b', boxWidth: 20, boxHeight: 6 } }
                },
                scales: {
                    ...commonOptions.scales,
                    x: { ...commonOptions.scales.x, title: { display: true, text: 'Call-Put 差引建玉数 (単位：枚)', color: '#475569'} }
                }
            }
        });
        
        attachCustomPan(ctxOI.canvas, `${targetChartObj}_oi`);

        // 2. Diff Chart (増減)
        const ctxDiff = document.getElementById(`${canvasIdPrefix}_Diff`).getContext('2d');
        if(chartObj[`${targetChartObj}_diff`]) chartObj[`${targetChartObj}_diff`].destroy();
        
        chartObj[`${targetChartObj}_diff`] = new Chart(ctxDiff, {
            type: 'bar',
            data: {
                labels: hasData ? dataObj.strikes : ['No Data'],
                datasets: [
                    {
                        label: 'コール前日比', // コール緑
                        data: hasData ? dataObj.c_diff : [0],
                        backgroundColor: '#7C4DFF',
                        barPercentage: 0.8
                    },
                    {
                        label: 'プット前日比', // プット赤
                        data: hasData ? dataObj.p_diff.map(v=>-v) : [0],
                        backgroundColor: '#f43f5e',
                        barPercentage: 0.8
                    }
                ]
            },
            options: {
                ...commonOptions,
                plugins: {
                    ...commonOptions.plugins,
                    legend: { position: 'top', labels: { color: '#64748b', boxWidth: 20, boxHeight: 6 } }
                },
                scales: {
                    ...commonOptions.scales,
                    x: { ...commonOptions.scales.x, title: { display: true, text: '増減数 (単位：枚)', color: '#475569'} }
                }
            }
        });

        attachCustomPan(ctxDiff.canvas, `${targetChartObj}_diff`);
    }

    function renderTrendChart() {
        // Collect N225 Total OI from all dates
        const dates = Object.keys(storedData).sort();
        let trendData = [];
        
        for(let d of dates) {
            let p1 = storedData[d].p1;
            if(p1 && p1.labels) {
                let idx = p1.labels.indexOf("日経225");
                if(idx !== -1 && p1.totals[idx]) {
                    trendData.push(p1.totals[idx]);
                } else {
                    trendData.push(null);
                }
            }
        }

        const ctx = document.getElementById('chartTrend').getContext('2d');
        if(chartObj.trend) chartObj.trend.destroy();
        
        chartObj.trend = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates.map(d => d.replace(/(\d{4})(\d{2})(\d{2})/, '$2/$3')),
                datasets: [{
                    label: '日経225オプション 総建玉',
                    data: trendData,
                    borderColor: '#7C4DFF',
                    backgroundColor: 'rgba(124, 77, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointBackgroundColor: '#651FFF'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#64748b', boxWidth: 20, boxHeight: 6 } }
                },
                scales: {
                    y: { grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });
    }

    // Run
    window.addEventListener('DOMContentLoaded', init);

</script>

<!-- ── 投資記録カード: Gist同期モジュール ────────────────────────────── -->
<script>
(function() {
    'use strict';

    // ── 状態 ─────────────────────────────────────────────────
    let calendarHistory = {};   // Gist history 全体のキャッシュ
    let currentCalDate = null;  // 表示中の日付 (YYYY-MM-DD)
    let mdeInfo = null, mdeDiary = null, mdeMarket = null;
    let isSaving = false;
    let editorsInitialized = false;

    // ── 日付変換: YYYYMMDD → YYYY-MM-DD ──────────────────────
    function toGistDate(yyyymmdd) {
        if (!yyyymmdd || yyyymmdd.length !== 8) return null;
        return `${yyyymmdd.slice(0,4)}-${yyyymmdd.slice(4,6)}-${yyyymmdd.slice(6,8)}`;
    }

    // ── EasyMDE 初期化 (DOMが準備完了後に1回だけ) ─────────────
    function initEditors() {
        if (editorsInitialized) return;
        editorsInitialized = true;
        const toolbarConfig = [
            'bold','italic','heading','|',
            'quote','unordered-list','ordered-list','|',
            'link','|','preview','side-by-side','fullscreen'
        ];
        const commonOpts = {
            spellChecker: false,
            autoSave: { enabled: false },
            toolbar: toolbarConfig,
            minHeight: '320px',
        };
        mdeInfo   = new EasyMDE({ element: document.getElementById('editorInfo'),   ...commonOpts });
        mdeDiary  = new EasyMDE({ element: document.getElementById('editorDiary'),  ...commonOpts });
        mdeMarket = new EasyMDE({ element: document.getElementById('editorMarket'), ...commonOpts });
    }

    // ── タブ切り替え ──────────────────────────────────────────
    function initTabs() {
        document.querySelectorAll('.cal-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                // アクティブスタイル切り替え
                document.querySelectorAll('.cal-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // パネル表示切り替え
                document.querySelectorAll('.cal-tab-pane').forEach(p => p.classList.add('hidden'));
                const tabId = 'calTab' + tab.charAt(0).toUpperCase() + tab.slice(1);
                document.getElementById(tabId).classList.remove('hidden');
                // EasyMDEリフレッシュ (非表示→表示時の描画修正)
                setTimeout(() => {
                    if (tab === 'info'   && mdeInfo)   mdeInfo.codemirror.refresh();
                    if (tab === 'diary'  && mdeDiary)  mdeDiary.codemirror.refresh();
                    if (tab === 'market' && mdeMarket) mdeMarket.codemirror.refresh();
                }, 30);
            });
        });
    }

    // ── 収支合計の自動更新 ────────────────────────────────────
    function initIncomeCalc() {
        const ids = ['incomeStocks','incomeMargin','incomeForeign','incomeCfd'];
        ids.forEach(id => {
            document.getElementById(id).addEventListener('input', updateIncomeTotal);
        });
    }

    function updateIncomeTotal() {
        const total = ['incomeStocks','incomeMargin','incomeForeign','incomeCfd']
            .reduce((sum, id) => sum + (parseFloat(document.getElementById(id).value) || 0), 0);
        const el = document.getElementById('incomeTotal');
        el.textContent = (total >= 0 ? '+' : '') + total.toLocaleString() + ' 円';
        el.style.background = total > 0 ? '#ede9fe' : total < 0 ? '#fee2e2' : '#f1f5f9';
        el.style.color = total > 0 ? '#7C4DFF' : total < 0 ? '#ef4444' : '#64748b';
    }

    // ── Gistデータ読み込み ─────────────────────────────────────
    async function loadGistData() {
        const token  = localStorage.getItem('gist_token') || '';
        const gistId = localStorage.getItem('gist_id') || '';
        const statusEl = document.getElementById('gistSyncStatus');

        if (!token || !gistId) {
            statusEl.textContent = '⚠ Gist未設定 (投資カレンダーの設定画面で設定してください)';
            statusEl.style.color = '#f59e0b';
            return;
        }
        statusEl.textContent = '読込中...';
        statusEl.style.color = '';

        try {
            // Gist APIメタデータ取得 (raw_urlを得るため)
            const resp = await fetch(`https://api.github.com/gists/${gistId.trim()}`, {
                headers: { 'Authorization': `token ${token.trim()}`, 'Accept': 'application/vnd.github.v3+json' },
                cache: 'no-store'
            });
            if (!resp.ok) throw new Error(`API HTTP ${resp.status}`);
            const gist = await resp.json();
            const rawUrl = gist.files['market_data.json']?.raw_url;
            if (!rawUrl) throw new Error('market_data.json が見つかりません');

            // raw_url (Auth不要 — CORS preflight回避)
            const rawResp = await fetch(rawUrl, { cache: 'no-store' });
            if (!rawResp.ok) throw new Error(`raw_url HTTP ${rawResp.status}`);
            const data = JSON.parse(await rawResp.text());
            calendarHistory = data.history || {};

            statusEl.textContent = '✓ 同期済み';
            statusEl.style.color = '#7C4DFF';

            // カード専用の日程プルダウンを最新日でセット
            populateCalDateSelector(calendarHistory);
        } catch(e) {
            statusEl.textContent = `⚠ 読込エラー: ${e.message}`;
            statusEl.style.color = '#ef4444';
            console.error('[CalendarCard] Gist load error:', e);
        }
    }

    // ── エディタに日付データをセット ──────────────────────────
    function loadDateToEditors(gistDate) {
        if (!editorsInitialized) return;
        currentCalDate = gistDate;
        const d = calendarHistory[gistDate] || {};
        const [y, m, day] = gistDate.split('-');
        const label = `${y}年${parseInt(m)}月${parseInt(day)}日`;
        // calDateSelの選択値を同期
        const dsel = document.getElementById('calDateSel');
        if (dsel && dsel.value !== gistDate) dsel.value = gistDate;

        // EasyMDEにセット
        const defaultInfo   = `# ${gistDate.replace(/-/g, '/')}`;
        if (mdeInfo)   { mdeInfo.value(d.info   || defaultInfo); }
        if (mdeDiary)  { mdeDiary.value(d.diary  || defaultInfo); }
        if (mdeMarket) { mdeMarket.value(d.market || defaultInfo); }

        // 収支フォーム
        document.getElementById('incomeStocks').value  = d.stocks  || 0;
        document.getElementById('incomeMargin').value  = d.margin  || 0;
        document.getElementById('incomeForeign').value = d.foreign || 0;
        document.getElementById('incomeCfd').value     = d.cfd     || 0;
        document.getElementById('incomeNote').value    = d.note    || '';
        updateIncomeTotal();

        // CodeMirror再描画 (表示状態のエディタのみ)
        setTimeout(() => {
            const activeTab = document.querySelector('.cal-tab-btn.active')?.dataset.tab;
            if (activeTab === 'info'   && mdeInfo)   mdeInfo.codemirror.refresh();
            if (activeTab === 'diary'  && mdeDiary)  mdeDiary.codemirror.refresh();
            if (activeTab === 'market' && mdeMarket) mdeMarket.codemirror.refresh();
        }, 50);
    }

    // ── Gistに保存 (Read-Merge-Write v3) ─────────────────────
    async function saveCalendarData() {
        if (!currentCalDate || isSaving) return;
        const token  = localStorage.getItem('gist_token') || '';
        const gistId = localStorage.getItem('gist_id') || '';
        const statusEl = document.getElementById('gistSyncStatus');

        if (!token || !gistId) {
            statusEl.textContent = '⚠ Gist未設定';
            return;
        }
        isSaving = true;
        statusEl.textContent = '保存中...';
        statusEl.style.color = '#f59e0b';

        try {
            const gistUrl = `https://api.github.com/gists/${gistId.trim()}`;
            const auth = { 'Authorization': `token ${token.trim()}`, 'Accept': 'application/vnd.github.v3+json' };

            // Read: 最新のGistを取得 (他ページでの変更をマージするため)
            const readResp = await fetch(gistUrl, { headers: auth, cache: 'no-store' });
            if (!readResp.ok) throw new Error(`Read HTTP ${readResp.status}`);
            const gistMeta = await readResp.json();
            const rawUrl = gistMeta.files['market_data.json']?.raw_url;
            if (!rawUrl) throw new Error('market_data.json が見つかりません');

            const rawResp = await fetch(rawUrl, { cache: 'no-store' });
            if (!rawResp.ok) throw new Error(`raw_url HTTP ${rawResp.status}`);
            const fullData = JSON.parse(await rawResp.text());

            // Merge: このページで編集した日付のデータだけ上書き
            const h = fullData.history || {};
            if (!h[currentCalDate]) h[currentCalDate] = {};
            if (mdeInfo)   h[currentCalDate].info   = mdeInfo.value();
            if (mdeDiary)  h[currentCalDate].diary   = mdeDiary.value();
            if (mdeMarket) h[currentCalDate].market  = mdeMarket.value();
            h[currentCalDate].stocks  = parseFloat(document.getElementById('incomeStocks').value)  || 0;
            h[currentCalDate].margin  = parseFloat(document.getElementById('incomeMargin').value)  || 0;
            h[currentCalDate].foreign = parseFloat(document.getElementById('incomeForeign').value) || 0;
            h[currentCalDate].cfd     = parseFloat(document.getElementById('incomeCfd').value)     || 0;
            h[currentCalDate].note    = document.getElementById('incomeNote').value || '';
            fullData.history = h;
            fullData.lastUpdated = new Date().toISOString();
            calendarHistory = h;  // ローカルキャッシュ更新

            // Write: コンパクトJSONでPATCH
            const writeResp = await fetch(gistUrl, {
                method: 'PATCH',
                headers: { ...auth, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'market_data.json': { content: JSON.stringify(fullData) } } })
            });
            if (!writeResp.ok) throw new Error(`Write HTTP ${writeResp.status}`);

            statusEl.textContent = '✓ 保存完了';
            statusEl.style.color = '#7C4DFF';
            setTimeout(() => { statusEl.textContent = '✓ 同期済み'; }, 2000);
        } catch(e) {
            statusEl.textContent = `⚠ 保存エラー: ${e.message}`;
            statusEl.style.color = '#ef4444';
            console.error('[CalendarCard] Save error:', e);
        } finally {
            isSaving = false;
        }
    }

    // ── カード専用日程プルダウンの構築 ────────────────────────
    function populateCalDateSelector(history) {
        const sel = document.getElementById('calDateSel');
        const dates = Object.keys(history).sort().reverse(); // 最新順
        if (dates.length === 0) { sel.innerHTML = '<option value="">データなし</option>'; return; }
        sel.innerHTML = dates.map(d => {
            const [y, m, day] = d.split('-');
            return `<option value="${d}">${y}年${parseInt(m)}月${parseInt(day)}日</option>`;
        }).join('');
        sel.value = dates[0]; // 最新日をデフォルト
        loadDateToEditors(dates[0]);
    }

    // ── 初期化 ───────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        initEditors();
        initTabs();
        initIncomeCalc();
        document.getElementById('calDateSel').addEventListener('change', (e) => {
            if (e.target.value) loadDateToEditors(e.target.value);
        });
        document.getElementById('btnSaveCalendar').addEventListener('click', saveCalendarData);
        loadGistData();
    });

})();
</script>
</body>
