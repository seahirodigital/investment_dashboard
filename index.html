                        try {
                            const h = localStorage.getItem('history_data'); 
                            if (h) setHistoryData(JSON.parse(h));
                            
                            const l = localStorage.getItem('market-dash-links'); 
                            let localLinksEmpty = true;
                            if (l) { 
                                const pl = JSON.parse(l); 
                                if(pl && pl.length > 0) {
                                    setCustomLinks(pl);
                                    localLinksEmpty = false;
                                } 
                            }
                            
                            const q = localStorage.getItem('market-dash-quotes');
                            let localQuotesEmpty = true;
                            if (q) { 
                                const pq = JSON.parse(q); 
                                if(pq && pq.length > 0) {
                                    setQuotes(pq);
                                    localQuotesEmpty = false;
                                } 
                            }

                            // もしGitHub連携設定があるのにリモート/ローカル共に空だった場合
                            // HTML内の初期値を保存して、以降Gistを優先するようにする
                            if (gistToken && gistId && localLinksEmpty && localQuotesEmpty) {
                                console.log("🔄 Initializing Gist with backup data...");
                                saveAllData(undefined, initialLinks, initialQuotes);
                            }
                        } catch (e) { console.error("Local Load Failed", e); }
                    }
                };
                loadData();
            }, []);

            const saveAllData = (newHistory, newLinks, newQuotes) => {
                const h = newHistory !== undefined ? newHistory : historyData; const l = newLinks !== undefined ? newLinks : customLinks; const q = newQuotes !== undefined ? newQuotes : quotes;
                if (newHistory !== undefined) setHistoryData(h); if (newLinks !== undefined) setCustomLinks(l); if (newQuotes !== undefined) setQuotes(q);
                try {
                    if (newHistory !== undefined) localStorage.setItem('history_data', JSON.stringify(h));
                    if (newLinks !== undefined) localStorage.setItem('market-dash-links', JSON.stringify(l));
                    if (newQuotes !== undefined) localStorage.setItem('market-dash-quotes', JSON.stringify(q));
                } catch (e) { console.error("Local Save Failed", e); }
                if (gistToken && gistId) {
                    const gistUrl = `https://api.github.com/gists/${gistId.trim()}`;
                    const gistAuth = { 'Authorization': `token ${gistToken.trim()}` };
                    // Read-Merge-Write v3: raw_url経由でtruncation完全回避 + エントリ保全 + フェイルセーフ
                    fetch(gistUrl, { headers: gistAuth, cache: 'no-store' })
                    .then(r => r.ok ? r.json() : null)
                    .then(async (gistData) => {
                        const mergedH = { ...h };
                        let gistReadOk = false;
                        try {
                            if (gistData && gistData.files && gistData.files['market_data.json']) {
                                // truncated時はraw_urlで完全データ取得（Auth不要、CORS preflight回避）
                                let gistContent = gistData.files['market_data.json'].content;
                                const rawUrl = gistData.files['market_data.json'].raw_url;
                                if (rawUrl) {
                                    // truncatedフラグに関係なく、raw_urlがあれば常に完全データを取得
                                    // （APIのcontentは閾値付近で不完全になる場合があるため）
                                    const rawResp = await fetch(rawUrl, { cache: 'no-store' });
                                    if (rawResp.ok) gistContent = await rawResp.text();
                                }
                                if (gistContent) {
                                    const gistHistory = JSON.parse(gistContent).history || {};
                                    gistReadOk = true;
                                    for (const key in gistHistory) {
                                        if (!mergedH[key]) {
                                            // ローカルに存在しない日付 → Gistのエントリを完全保全
                                            mergedH[key] = gistHistory[key];
                                        } else {
                                            // 両方に存在 → infoフィールドはGist側が長ければ保護
                                            const gi = gistHistory[key] && gistHistory[key].info;
                                            if (gi && gi.length > 15) {
                                                const li = mergedH[key].info || '';
                                                if (gi.length > li.length) mergedH[key] = { ...mergedH[key], info: gi };
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (e) { console.warn("Info merge skipped:", e); }
                        // フェイルセーフ: Gist読み取り失敗時はGist書き込みを中止（データ消失防止）
                        if (!gistReadOk) { console.warn("⚠️ Sync: Gist read failed, skipping write to prevent data loss"); return; }
                        const content = JSON.stringify({ history: mergedH, links: l, quotes: q, lastUpdated: new Date().toISOString() });
                        return fetch(gistUrl, { method: 'PATCH', headers: { ...gistAuth, 'Content-Type': 'application/json' }, body: JSON.stringify({ files: { 'market_data.json': { content: content } } }) });
                    })
                    .then(res => { if(res && !res.ok) console.warn("⚠️ Sync: Gist Save Failed", res.status); })
                    .catch(e => console.error("❌ Sync: Gist Network Error", e));
                }
            };

            const [isAddingLink, setIsAddingLink] = useState(false);
            const [newLinkLabel, setNewLinkLabel] = useState('');
            const [newLinkUrl, setNewLinkUrl] = useState('');
            const [linkType, setLinkType] = useState('link');
            const [collapsedCategories, setCollapsedCategories] = useState({});
            const [draggedIndex, setDraggedIndex] = useState(null);

            const toggleCategory = (i) => setCollapsedCategories(p => ({ ...p, [i]: !p[i] }));
            const openAllInGroup = (start) => {
                if (!customLinks[start] || customLinks[start].type !== 'divider') return;
                const linksToOpen = [];
                for (let i = start + 1; i < customLinks.length; i++) { const item = customLinks[i]; if (item.type === 'divider') break; if (item.url && item.url.trim()) linksToOpen.push(item.url); }
                if (linksToOpen.length === 0) { alert('このカテゴリにはリンクがありません'); return; }
                if (linksToOpen.length > 5 && !confirm(`${linksToOpen.length}個のタブを開きますか？`)) return;
                linksToOpen.forEach(url => { window.open(url, '_blank'); });
            };

            const addCustomLink = () => { if ((linkType === 'link' && newLinkLabel && newLinkUrl) || (linkType === 'divider' && newLinkLabel)) { let url = newLinkUrl; if (linkType === 'link' && !/^https?:\/\//i.test(url)) url = 'https://' + url; const newItem = { label: newLinkLabel, url: linkType === 'link' ? url : '', type: linkType }; const updated = [...customLinks, newItem]; setNewLinkLabel(''); setNewLinkUrl(''); setIsAddingLink(false); saveAllData(undefined, updated, undefined); } };
            const removeCustomLink = (i) => { const updated = customLinks.filter((_, idx) => idx !== i); saveAllData(undefined, updated, undefined); };
            const handleDragStart = (e, i) => { setDraggedIndex(i); e.dataTransfer.effectAllowed = 'move'; };
            const handleDragOver = (e, i) => { e.preventDefault(); if (draggedIndex === null || draggedIndex === i) return; const newLinks = [...customLinks]; const [removed] = newLinks.splice(draggedIndex, 1); newLinks.splice(i, 0, removed); saveAllData(undefined, newLinks, undefined); setDraggedIndex(i); };
            const startResizing = useCallback((e) => { e.preventDefault(); setIsResizing(true); }, []);
            useEffect(() => { const handleMouseMove = (e) => { if (isResizing) { let w = e.clientX; if (w < 150) w = 150; if (w > 400) w = 400; setSidebarWidth(w); } }; const handleMouseUp = () => { if (isResizing) setIsResizing(false); }; if (isResizing) { document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp); } return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); }; }, [isResizing]);

            const NavItem = ({ id, label, icon, sub = false }) => ( <button onClick={() => { setView(id); setSidebarOpen(false); }} className={`w-full flex items-center gap-3 ${sub && !isCollapsed ? 'pl-5 pr-3' : 'px-3'} py-2 rounded-lg transition-colors mb-0.5 ${view === id ? 'bg-[#7C4DFF] text-white shadow' : 'text-[#64748B] hover:bg-slate-100'} ${isCollapsed ? 'justify-center' : ''}`} title={isCollapsed ? label : ''}><Icon name={icon} size={sub ? 16 : 20} />{!isCollapsed && <span className={`font-medium ${sub ? 'text-xs' : 'text-sm'}`}>{label}</span>}</button> );
            const NavSection = ({ label }) => !isCollapsed ? <div className="text-[10px] font-bold text-slate-400 px-2 mb-1 mt-4 uppercase tracking-wider">{label}</div> : <div className="border-t border-slate-100 my-2" />;
            const renderCustomLinks = () => { const elements = []; let currentCategoryHidden = false; customLinks.forEach((link, i) => { if (link.type === 'divider') { currentCategoryHidden = collapsedCategories[i] || false; elements.push(<div key={i} draggable onDragStart={(e) => handleDragStart(e, i)} onDragOver={(e) => handleDragOver(e, i)} className={`group flex items-center gap-2 px-2 py-1.5 rounded-lg mt-3 mb-1 cursor-move transition-colors hover:bg-slate-100 ${draggedIndex === i ? 'dragging' : ''}`}><div className="text-slate-300 group-hover:text-slate-400 cursor-grab active:cursor-grabbing"><Icon name="GripVertical" size={14} /></div><div className="flex-1 flex items-center gap-2 overflow-hidden cursor-pointer" onClick={() => toggleCategory(i)}><Icon name={currentCategoryHidden ? "ChevronRight" : "ChevronLeft"} size={14} className="text-slate-400 transition-transform" style={{ transform: currentCategoryHidden ? 'rotate(0deg)' : 'rotate(-90deg)' }} /><Icon name="FolderOpen" size={14} className="text-[#7C4DFF]" /><span className="text-xs font-bold text-slate-500 uppercase tracking-wider truncate select-none">{link.label}</span></div><button onClick={() => openAllInGroup(i)} className="opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-[#7C4DFF] transition-opacity"><Icon name="ExternalLink" size={12} /></button><button onClick={() => removeCustomLink(i)} className="opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-500 transition-opacity"><Icon name="Trash2" size={12} /></button></div>); } else { if (!currentCategoryHidden) { elements.push(<div key={i} draggable onDragStart={(e) => handleDragStart(e, i)} onDragOver={(e) => handleDragOver(e, i)} className={`group flex items-center gap-2 px-3 py-1 ml-4 rounded-lg transition-colors cursor-move hover:bg-slate-100 ${draggedIndex === i ? 'dragging' : ''}`}><div className="text-slate-300 group-hover:text-slate-400 cursor-grab active:cursor-grabbing"><Icon name="GripVertical" size={12} /></div><a href={link.url} target="_blank" rel="noopener noreferrer" className="flex-1 flex items-center gap-2 text-slate-600 text-sm font-medium overflow-hidden pointer-events-none group-hover:pointer-events-auto"><Icon name="Link" size={12} className="shrink-0 text-slate-400" /><span className="truncate">{link.label}</span></a><button onClick={() => removeCustomLink(i)} className="opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-500 transition-opacity"><Icon name="Trash2" size={12} /></button></div>); } } }); return elements; };
            const handleMoveToQuotes = (text) => { setQuotePrefill(text); setView('quotes'); };

            return (
                <div className="flex h-screen overflow-hidden bg-[#f8fafc]">
                    <aside className={`fixed lg:static inset-y-0 left-0 z-50 bg-white border-r border-slate-200 transform transition-all duration-75 shadow-xl lg:shadow-none flex flex-col ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`} style={{ width: isCollapsed ? 70 : sidebarWidth }}>
                        <div className="h-14 flex items-center justify-between px-4 border-b border-slate-100 shrink-0">{!isCollapsed && <span className="font-bold text-lg tracking-tight text-[#334155]">Dashboard</span>}<button onClick={() => setIsCollapsed(!isCollapsed)} className="p-1 text-slate-400 hover:text-[#7C4DFF] hover:bg-slate-50 rounded mx-auto lg:mx-0"><Icon name={isCollapsed ? "ChevronRight" : "ChevronLeft"} size={20} /></button></div>
                        <div className="flex-1 overflow-y-auto overflow-x-hidden p-3 space-y-1 flex flex-col relative custom-scrollbar">
                            {!isCollapsed && <div className="text-[10px] font-bold text-slate-400 px-2 mb-2 mt-2">MENU</div>}
                            <NavItem id="calendar" label="投資カレンダー" icon="Calendar" />
                            <NavItem id="quotes" label="格言集" icon="Lightbulb" />
                            <NavSection label="ETFセクター分析" />
                            <NavItem id="sector_category" label="セクター分類分析" icon="BarChart3" sub />
                            <NavItem id="analytics" label="セクター別感応度" icon="Activity" sub />
                            <NavSection label="個別分析" />
                            <NavItem id="topix100" label="TOPIX100分析" icon="BarChart3" sub />
                            <NavItem id="us_individual" label="US個別分析" icon="BarChart3" sub />
                            <NavSection label="売買フロー" />
                            <NavItem id="short_selling" label="売買フロー" icon="Activity" sub />
                            <NavSection label="主体別分析" />
                            <NavItem id="trends" label="主体別投資動向" icon="TrendingUp" sub />
                            <NavItem id="jpx" label="海外動向（JPX・財務省）" icon="Globe" sub />
                            <NavItem id="gpif" label="GPIF分析" icon="Database" sub />
                            <NavSection label="オプション分析" />
                            <NavItem id="nf_option" label="日経225建玉（JPX）" icon="BarChart3" sub />
                            <NavItem id="nf_teguchi" label="手口データ分析" icon="FileText" sub />
                            <NavItem id="option" label="Option分析" icon="Activity" sub />
                            {!isCollapsed && (<><div className="flex-1 min-h-[20px]"></div><div className="pb-16">{customLinks.length > 0 && (<div className="space-y-0.5"><div className="text-[10px] font-bold text-slate-400 px-2 mb-2">QUICK LINKS</div>{renderCustomLinks()}</div>)}</div><div className="fixed bottom-4 z-50 transition-all duration-75" style={{ left: isCollapsed ? '15px' : `${sidebarWidth - 60}px` }}>{!isAddingLink ? (<button onClick={() => setIsAddingLink(true)} className="w-10 h-10 flex items-center justify-center rounded-full bg-[#7C4DFF] border border-[#7C4DFF] text-white shadow-lg hover:bg-[#651FFF] transition-all duration-200"><Icon name="Plus" size={20} /></button>) : (<div className="w-64 bg-white rounded-xl shadow-xl border border-slate-200 p-4 animate-fade-in-up absolute bottom-0 right-0"><div className="flex justify-between items-center mb-3"><p className="text-xs font-bold text-slate-500 uppercase">Add Item</p><button onClick={() => setIsAddingLink(false)} className="text-slate-400 hover:text-slate-600"><Icon name="X" size={14} /></button></div><div className="flex bg-slate-100 p-1 rounded-lg mb-3"><button onClick={() => setLinkType('link')} className={`flex-1 text-xs py-1.5 rounded-md font-bold transition-all ${linkType === 'link' ? 'bg-white text-[#7C4DFF] shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>LINK</button><button onClick={() => setLinkType('divider')} className={`flex-1 text-xs py-1.5 rounded-md font-bold transition-all ${linkType === 'divider' ? 'bg-white text-[#7C4DFF] shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>CATEGORY</button></div><div className="space-y-3"><input type="text" placeholder="Name" autoFocus className="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#7C4DFF]" value={newLinkLabel} onChange={(e) => setNewLinkLabel(e.target.value)} />{linkType === 'link' && (<input type="text" placeholder="URL" className="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#7C4DFF]" value={newLinkUrl} onChange={(e) => setNewLinkUrl(e.target.value)} />)}<button onClick={addCustomLink} disabled={!newLinkLabel || (linkType === 'link' && !newLinkUrl)} className="w-full bg-[#7C4DFF] text-white text-xs py-2 rounded-lg hover:bg-[#651FFF] disabled:opacity-50 font-bold">追加</button></div></div>)}</div></>)}
                            {!isCollapsed && <div className="mt-4 px-4 pb-2 text-[10px] text-slate-300 text-center">v2026.02.12-modal-save-fix</div>}
                        </div>
                        {!isCollapsed && (<div className="absolute top-0 right-0 w-1 h-full cursor-col-resize hover:bg-[#7C4DFF] transition-colors z-50 flex flex-col justify-center items-center group" onMouseDown={startResizing}><div className="h-8 w-1 bg-slate-300 rounded-full group-hover:bg-[#7C4DFF]"></div></div>)}
                    </aside>
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden" onClick={() => setSidebarOpen(false)}></div>}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="h-14 bg-white border-b border-slate-200 flex items-center px-4 lg:hidden shrink-0"><button onClick={() => setSidebarOpen(true)} className="p-2 text-slate-600"><Icon name="Menu" /></button><span className="ml-4 font-bold text-[#334155]">{view === 'calendar' ? '投資カレンダー' : view === 'option' ? 'Option 分析' : view === 'nf_option' ? 'オプション建玉監視' : view === 'nf_teguchi' ? '手口データ分析' : view === 'jpx' ? '海外動向（JPX・財務省）' : view === 'quotes' ? '投資の格言集' : view === 'sector_category' ? 'セクター分類分析' : view === 'analytics' ? 'セクター別感応度' : view === 'short_selling' ? '売買フロー' : view === 'gpif' ? 'GPIF分析' : view === 'trends' ? '主体別投資動向' : view === 'topix100' ? 'TOPIX100分析' : view === 'us_individual' ? 'US個別分析' : '取引参加者別取引高'}</span></header>
                        <main className="flex-1 overflow-auto p-4 md:p-6 bg-slate-50/50">
                            <div className="max-w-7xl mx-auto h-full">
                                {view === 'calendar' ? <ProfitManager historyData={historyData} updateHistoryData={(nd) => saveAllData(nd, undefined, undefined)} customLinks={customLinks} setCustomLinks={(nl) => saveAllData(undefined, nl, undefined)} quotes={quotes} setQuotes={(nq) => saveAllData(undefined, undefined, nq)} saveAllData={saveAllData} onMoveToQuotes={handleMoveToQuotes} /> :
                                    view === 'quotes' ? <QuotesManager quotes={quotes} setQuotes={(nq) => saveAllData(undefined, undefined, nq)} prefillBody={quotePrefill} uploadConfig={{token: gistToken, owner: localStorage.getItem('repo_owner') || 'seahirodigital', repo: localStorage.getItem('repo_name') || 'investment_dashboard'}} /> :
                                        view === 'jpx' ? <ForeignInvestors /> :
                                            view === 'trends' ? <InvestorTrends /> :
                                                    view === 'nf_option' ? <iframe src="option.html" className="w-full h-[90vh] border-none rounded-xl" title="オプション建玉監視"></iframe> :
                                                        view === 'nf_teguchi' ? <iframe src="teguchi.html" className="w-full h-[90vh] border-none rounded-xl" title="手口データ分析"></iframe> :
                                                            view === 'analytics' ? <iframe src="analytics.html" className="w-full h-[90vh] border-none rounded-xl" title="セクター別解析"></iframe> :
                                                                view === 'gpif' ? <iframe src="GPIF/dist/index.html" className="w-full h-[90vh] border-none rounded-xl bg-white shadow-sm" title="GPIF分析"></iframe> :
                                                                    view === 'sector_category' ? <iframe src="sector_category.html" className="w-full h-[90vh] border-none rounded-xl" title="セクター分類分析"></iframe> :
                                                                        view === 'short_selling' ? <iframe src="short_selling.html" className="w-full h-[90vh] border-none rounded-xl" title="売買フロー分析"></iframe> :
                                                                            view === 'topix100' ? <iframe src="topix100.html" className="w-full h-[90vh] border-none rounded-xl" title="TOPIX100分析"></iframe> :
                                                                            view === 'us_individual' ? <iframe src="us_individual.html" className="w-full h-[90vh] border-none rounded-xl" title="US個別分析"></iframe> :
                                                <OptionOI charts={optionCharts} setCharts={setOptionCharts} />}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
