name: Daily Market Analysis (Gemini)

on:
  schedule:
    # 18:15 JST = 09:15 UTC
    - cron: '15 9 * * 1-5'
  workflow_dispatch:
    inputs:
      note_post_mode:
        description: 'note投稿モード'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - draft-note-only
          - dry-run
          - draft
          - skip
      note_date:
        description: 'note記事日付（空なら当日、該当レポートがなければ最新レポート）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  market-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check JST weekday
        id: weekday
        run: |
          day="$(TZ=Asia/Tokyo date +%u)"
          echo "day=$day" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            echo "is_weekday=true" >> "$GITHUB_OUTPUT"
            echo "手動実行のため、JSTの曜日に関係なく Daily Market Analysis を実行します。"
          elif [ "$day" -ge 6 ]; then
            echo "is_weekday=false" >> "$GITHUB_OUTPUT"
            echo "JST weekend; skipping Daily Market Analysis."
          else
            echo "is_weekday=true" >> "$GITHUB_OUTPUT"
            echo "JST weekday; continuing Daily Market Analysis."
          fi

      - name: Checkout repository
        if: ${{ steps.weekday.outputs.is_weekday == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Checkout notion2note
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode != 'skip') }}
        uses: actions/checkout@v4
        with:
          repository: seahirodigital/notion2note
          path: _external/notion2note

      - name: Set up Python
        if: ${{ steps.weekday.outputs.is_weekday == 'true' }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ steps.weekday.outputs.is_weekday == 'true' }}
        run: |
          pip install -r requirements.txt
          if [ -d "_external/notion2note" ]; then
            pip install -r _external/notion2note/requirements.txt
            # note画像生成で動作確認済みのPlaywrightとChromiumを固定する。
            pip install 'playwright==1.60.0'
            # GitHub Actions の Ubuntu イメージ側で Microsoft apt リポジトリが 403 になることがある。
            # Chromium の実行には不要なので、一時ランナー内だけで無効化して Playwright の依存導入を安定させる。
            while IFS= read -r source_file; do
              echo "不安定な Microsoft apt ソースを無効化します: $source_file"
              sudo rm -f "$source_file"
            done < <(grep -Rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)

            for attempt in 1 2 3; do
              if python -m playwright install --with-deps chromium; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "::error::Playwright Chromium のインストールが3回失敗しました。"
                exit 1
              fi
              echo "Playwright Chromium のインストールに失敗しました ($attempt/3)。15秒後に再試行します..."
              sleep 15
            done

            python -c "from playwright.sync_api import sync_playwright; pw = sync_playwright().start(); browser = pw.chromium.launch(); browser.close(); pw.stop(); print('Playwright Chromium の起動確認 OK')"
          fi

      # ── Step 1: データ取得 ──────────────────────────────────
      - name: Fetch intraday data
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        run: python scripts/market/fetch_intraday.py
        continue-on-error: true

      - name: Fetch ETF daily data
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        run: python scripts/market/etf_data_manager.py
        continue-on-error: true

      - name: Fetch short selling data
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        run: python scripts/market/fetch_short_selling.py
        continue-on-error: true

      # teguchi/option データは daily_participant.yml (08:45 UTC) で取得済み
      # 万一未取得の場合のフォールバックとして実行（失敗しても分析は続行）
      - name: Fetch teguchi data (fallback)
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
        run: python scripts/jpx/fetch_teguchi.py
        continue-on-error: true

      - name: Fetch option data (fallback)
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
        run: python scripts/jpx/fetch_option.py
        continue-on-error: true

      # ── Step 2: Gemini 分析 + note投稿 ─
      - name: Run Gemini market analysis or note-only debug
        if: ${{ steps.weekday.outputs.is_weekday == 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
          NOTION2NOTE_DISCORD_WEBHOOK: ${{ secrets.NOTION2NOTE_DISCORD_WEBHOOK }}
          NOTE_POST_MODE: ${{ github.event_name == 'schedule' && 'publish' || github.event.inputs.note_post_mode }}
          NOTE_POST_DATE: ${{ github.event.inputs.note_date }}
          NOTE_PROJECT_DIR: ${{ github.workspace }}/_external/notion2note
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_STORAGE_SECRET_NAME: NOTE_STORAGE_STATE
          NOTE_PUBLISH_MAGAZINE_NAME: '日本株の振り返りまとめ '
          NOTE_AFFILIATE_MEMO: '1'
          NOTE_AFFILIATE_COUNT: '1'
          NOTE_AFFILIATE_SEED: ${{ github.run_id }}
          # 外部Webフォントの読込不良でスクリーンショット全体が停止することを防ぐ。
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'
        run: |
          if [ "$NOTE_POST_MODE" = "draft-note-only" ]; then
            python scripts/market/gemini_analysis.py --note-post-mode draft-note-only --note-date "$NOTE_POST_DATE"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$NOTE_POST_MODE" = "dry-run" ]; then
            python scripts/market/gemini_analysis.py --note-only --note-dry-run-publish --note-date "$NOTE_POST_DATE"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$NOTE_POST_MODE" = "draft" ]; then
            python scripts/market/gemini_analysis.py --note-only --note-draft --note-date "$NOTE_POST_DATE"
          else
            python scripts/market/gemini_analysis.py --note-post-mode "$NOTE_POST_MODE" --note-date "$NOTE_POST_DATE"
          fi

      - name: Upload note generated artifacts
        if: ${{ always() && steps.weekday.outputs.is_weekday == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: note-blog-generated-${{ github.run_id }}
          path: note/generated
          if-no-files-found: ignore
          retention-days: 7

      # ── Step 3: レポートとデータをコミット ──────────────────
      - name: Commit reports and data
        if: ${{ steps.weekday.outputs.is_weekday == 'true' && (github.event_name == 'schedule' || github.event.inputs.note_post_mode == 'publish' || github.event.inputs.note_post_mode == 'skip') }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/*.json
          git add market_analysis/reports/*.md

          if ! git diff --staged --quiet; then
            git commit -m "Auto: Daily Market Analysis Report $(date +'%Y-%m-%d')"
            # intraday_etf が頻繁にpushするため、pull --rebase で競合回避
            for i in 1 2 3; do
              git pull --rebase origin main || { git rebase --abort 2>/dev/null; true; }
              if git push origin main; then
                echo "Report committed and pushed."
                exit 0
              fi
              echo "Push failed (attempt $i/3). Retrying in 10s..."
              sleep 10
            done
            echo "::error::All push attempts failed."
            exit 1
          else
            echo "No changes to commit."
          fi
