name: Intraday ETF Update (市場時間中 15分ごと)

on:
  schedule:
    # UTC 0:00-6:45 = JST 9:00-15:45（平日のみ）
    # 前場(9:00-11:30) / 後場(12:30-15:30) をカバー
    - cron: '0,15,30,45 0-6 * * 1-5'
  workflow_dispatch:

# 同時実行を1つに制限
concurrency:
  group: intraday-etf-update
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: pip キャッシュ設定
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-intraday-v1
          restore-keys: |
            ${{ runner.os }}-pip-intraday-

      - name: 最小限の依存パッケージをインストール（高速化）
        run: pip install yfinance pandas pytz

      - name: イントラデイデータ取得（5分足 14日分）
        run: |
          python3 scripts/market/fetch_intraday.py

      - name: mainブランチにコミット&プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [intraday]"
          git add data/etf_intraday.json
          if ! git diff --staged --quiet; then
            git commit -m "Intraday update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ mainブランチ更新完了"
          else
            echo "変更なし、スキップ"
          fi

      - name: デプロイ用ディレクトリ準備
        run: |
          mkdir -p deploy/data
          # mainの最新データ（今回コミットしたものを含む）をdeploy/に配置
          cp data/etf_intraday.json deploy/data/etf_intraday.json
          # 他のデータファイルもdeploy/に含める（CDNから消えないように）
          for f in data/*.json; do
            cp "$f" "deploy/data/$(basename $f)"
          done
          # HTMLファイルもコピー
          for file in index.html option.html etf.html teguchi.html advanced.html analytics.html sector_category.html; do
            [ -f "$file" ] && cp "$file" deploy/
          done
          [ -d css ] && cp -r css deploy/
          [ -d js ] && cp -r js deploy/
          echo "✅ deploy/ 準備完了"
          ls deploy/data/

      - name: peaceiris で gh-pages にデプロイ → CDN更新
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
