name: Intraday ETF Update (市場時間中 15分ごと)

on:
  schedule:
    # UTC 0:00-6:45 = JST 9:00-15:45（平日のみ）
    # 前場(9:00-11:30) / 後場(12:30-15:30) をカバー
    - cron: '0,15,30,45 0-6 * * 1-5'
  workflow_dispatch:

# 同時実行を1つに制限（キューに溜まった場合は待機して順次実行）
# cancel-in-progress: false にすることでスケジュール遅延時の取りこぼしを防ぐ
concurrency:
  group: intraday-etf-update
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: pip キャッシュ設定
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-intraday-v1
          restore-keys: |
            ${{ runner.os }}-pip-intraday-

      - name: 最小限の依存パッケージをインストール（高速化）
        run: pip install yfinance pandas pytz

      - name: イントラデイデータ取得（5分足 14日分）
        run: |
          python3 scripts/market/fetch_intraday.py

      - name: gh-pages に直接デプロイ（etf_intraday_data.json のみ上書き）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [intraday]"

          # 生成済みファイルを一時保存
          cp data/etf_intraday_data.json /tmp/etf_intraday_data.json

          # gh-pages ブランチを取得して切り替え
          git fetch origin gh-pages
          git checkout -B gh-pages origin/gh-pages

          # 対象ファイルのみ更新
          mkdir -p data
          cp /tmp/etf_intraday_data.json data/etf_intraday_data.json

          # 変更があればコミット・プッシュ
          git add data/etf_intraday_data.json
          if ! git diff --staged --quiet; then
            git commit -m "Intraday update: $(date +'%Y-%m-%d %H:%M UTC')"
            # --force-with-lease でリモートの意図せぬ上書きを防ぎつつ確実にプッシュ
            git push --force-with-lease origin gh-pages || \
              (echo "force-with-lease 失敗、リトライ中..." && \
               git fetch origin gh-pages && \
               git checkout -B gh-pages origin/gh-pages && \
               mkdir -p data && \
               cp /tmp/etf_intraday_data.json data/etf_intraday_data.json && \
               git add data/etf_intraday_data.json && \
               git commit -m "Intraday update (retry): $(date +'%Y-%m-%d %H:%M UTC')" && \
               git push --force origin gh-pages)
            echo "✅ gh-pages 更新完了"
          else
            echo "変更なし、スキップ"
          fi
