name: Intraday ETF Update (市場時間中 15分ごと)

on:
  schedule:
    # UTC 0:00-6:45 = JST 9:00-15:45（平日のみ）
    # 前場(9:00-11:30) / 後場(12:30-15:30) をカバー
    - cron: '0,15,30,45 0-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: イントラデイデータ取得（5分足 14日分）
        run: |
          python3 -c "
          import sys, os, json
          os.makedirs('data', exist_ok=True)
          sys.path.insert(0, 'scripts/market')
          from etf_data_manager import fetch_data
          data = fetch_data(period='14d', interval='5m')
          with open('data/etf_intraday_data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)
          print(f'完了: {len(data[\"dates\"])} ticks')
          "

      - name: gh-pages に直接デプロイ（etf_intraday_data.json のみ上書き）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [intraday]"

          # 生成済みファイルを一時保存
          cp data/etf_intraday_data.json /tmp/etf_intraday_data.json

          # gh-pages ブランチを取得して切り替え
          git fetch origin gh-pages
          git checkout gh-pages

          # 対象ファイルのみ更新
          mkdir -p data
          cp /tmp/etf_intraday_data.json data/etf_intraday_data.json

          # 変更があればコミット・プッシュ
          git add data/etf_intraday_data.json
          if ! git diff --staged --quiet; then
            git commit -m "Intraday update: $(date +'%Y-%m-%d %H:%M UTC')"
            git push origin gh-pages
            echo "✅ gh-pages 更新完了"
          else
            echo "変更なし、スキップ"
          fi
