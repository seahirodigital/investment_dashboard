name: Intraday ETF Update (市場時間中 15分ごと)

on:
  schedule:
    # UTC 0:00-6:45 = JST 9:00-15:45（平日のみ）
    # 前場(9:00-11:30) / 後場(12:30-15:30) をカバー
    - cron: '0,15,30,45 0-6 * * 1-5'
  workflow_dispatch:

# 同時実行を1つに制限（キューに溜まった場合は待機して順次実行）
# cancel-in-progress: false にすることでスケジュール遅延時の取りこぼしを防ぐ
concurrency:
  group: intraday-etf-update
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update_intraday:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: pip キャッシュ設定
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-intraday-v1
          restore-keys: |
            ${{ runner.os }}-pip-intraday-

      - name: 最小限の依存パッケージをインストール（高速化）
        run: pip install yfinance pandas pytz

      - name: イントラデイデータ取得（5分足 14日分）
        run: |
          python3 scripts/market/fetch_intraday.py

      - name: デプロイ用ディレクトリ準備（イントラデイデータのみ）
        run: |
          mkdir -p deploy/data
          cp data/etf_intraday_data.json deploy/data/etf_intraday_data.json
          echo "✅ deploy/data/etf_intraday_data.json 準備完了"
          ls -la deploy/data/

      - name: peaceiris で gh-pages にデプロイ
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
