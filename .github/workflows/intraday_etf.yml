name: Intraday ETF Update (JP/US市場時間中 15分ごとループ)

on:
  schedule:
    # ── JP市場（東証）────────────────────────────────────────
    # 前場起動（JST 9:00 = UTC 0:00）+ バックアップ2回
    - cron: '0 0 * * 1-5'
    - cron: '15 0 * * 1-5'
    - cron: '30 0 * * 1-5'
    # 後場起動（JST 12:30 = UTC 3:30）+ バックアップ2回
    - cron: '30 3 * * 1-5'
    - cron: '45 3 * * 1-5'
    - cron: '0 4 * * 1-5'
    # ── US市場（NYSE/NASDAQ）──────────────────────────────────
    # US市場起動（EDT 9:30 = UTC 13:30 = JST 22:30）+ バックアップ2回
    - cron: '30 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    # US後半起動（UTC 17:00 = JST 翌2:00）+ バックアップ（6時間制限対策）
    - cron: '0 17 * * 1-5'
    - cron: '15 17 * * 1-5'
  workflow_dispatch:

# 同時実行を1つに制限（バックアップcronが発火しても重複しない）
concurrency:
  group: intraday-etf-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update_intraday:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: pip キャッシュ設定
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-intraday-v1
          restore-keys: |
            ${{ runner.os }}-pip-intraday-

      - name: 最小限の依存パッケージをインストール
        run: pip install yfinance pandas pytz

      - name: gh-pagesブランチの準備
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/gh-pages
          cd /tmp/gh-pages
          git config user.email "action@github.com"
          git config user.name "GitHub Actions [intraday]"

      - name: 市場時間中ループ（JP/US 15分間隔でデータ取得→コミット→CDNデプロイ）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [intraday]"

          while true; do
            JST_HOUR=$(TZ=Asia/Tokyo date +%H)
            JST_MIN=$(TZ=Asia/Tokyo date +%M)
            TOTAL_MIN=$((10#$JST_HOUR * 60 + 10#$JST_MIN))

            echo "=========================================="
            echo "🕐 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST') (${TOTAL_MIN}分)"
            echo "=========================================="

            # ── セッション判定 ──
            # JP市場: 9:00-15:45 JST (540-945分)
            # US市場: 22:00-翌05:30 JST (1320分-翌330分、日付またぎ)
            IN_SESSION=false
            SESSION_NAME=""

            # JP市場チェック
            if [ $TOTAL_MIN -ge 540 ] && [ $TOTAL_MIN -lt 945 ]; then
              # JP昼休み 11:30-12:30 → 5分待機
              if [ $TOTAL_MIN -ge 690 ] && [ $TOTAL_MIN -lt 750 ]; then
                echo "🍱 JP昼休み中。5分後に再チェック..."
                sleep 300
                continue
              fi
              IN_SESSION=true
              SESSION_NAME="JP"
            fi

            # US市場チェック（22:00 JST = 1320分 〜 翌05:30 JST = 330分）
            if [ $TOTAL_MIN -ge 1320 ] || [ $TOTAL_MIN -lt 330 ]; then
              IN_SESSION=true
              SESSION_NAME="US"
            fi

            # セッション外 → 終了
            if [ "$IN_SESSION" = "false" ]; then
              echo "✅ 市場時間外（${SESSION_NAME:-JP/US間}）。ワークフロー終了。"
              break
            fi

            echo "📈 ${SESSION_NAME}市場セッション中"

            # === データ取得 ===
            echo "📊 データ取得中..."
            if ! python3 scripts/market/fetch_intraday.py; then
              echo "⚠️ データ取得失敗。15分後に再試行。"
              sleep 900
              continue
            fi

            # === mainブランチにコミット&プッシュ ===
            git add data/etf_intraday.json
            if ! git diff --staged --quiet; then
              git commit -m "Intraday update: $(date +'%Y-%m-%d %H:%M UTC')"
              git pull --rebase origin main || { git rebase --abort 2>/dev/null; true; }
              if git push origin main; then
                echo "✅ mainブランチ更新完了"
              else
                echo "⚠️ mainプッシュ失敗（次サイクルで再試行）"
              fi
            else
              echo "📋 データ変更なし"
            fi

            # === gh-pagesにデプロイ（CDN更新） ===
            echo "🚀 CDNデプロイ中..."

            cd /tmp/gh-pages
            git pull origin gh-pages --rebase || true

            # データファイルをコピー
            cd ${GITHUB_WORKSPACE}
            mkdir -p /tmp/gh-pages/data
            for f in data/*.json; do
              cp "$f" "/tmp/gh-pages/data/$(basename "$f")"
            done

            # HTMLファイルをコピー
            for file in index.html option.html etf.html teguchi.html advanced.html analytics.html sector_category.html; do
              [ -f "$file" ] && cp "$file" /tmp/gh-pages/
            done
            [ -d css ] && cp -r css /tmp/gh-pages/
            [ -d js ] && cp -r js /tmp/gh-pages/

            cd /tmp/gh-pages
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "Intraday CDN update: $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
              if git push origin gh-pages; then
                echo "✅ CDNデプロイ完了"
              else
                echo "⚠️ gh-pagesプッシュ失敗（次サイクルで再試行）"
              fi
            else
              echo "📋 CDN変更なし"
            fi

            cd ${GITHUB_WORKSPACE}

            # === 15分待機 ===
            echo "⏰ 次の更新まで15分待機..."
            sleep 900
          done

          echo "🏁 ワークフロー正常終了"
