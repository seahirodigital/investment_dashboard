name: Weekly Investor Trends (nikkei225jp)

on:
  workflow_dispatch:
  schedule:
    # 毎週木曜 JST 17:20 = UTC 木曜 08:20
    - cron: '20 8 * * 4'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-investor-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch investor trends
        run: python scripts/nikkei225jp/fetch_investor_trends.py

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit to main branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Investor Trends Data: $(date -u +%Y-%m-%d)"
          git push origin HEAD

      - name: Prepare deployment files
        run: |
          mkdir -p deploy/data
          [ -d data ] && cp -r data/* deploy/data/
          ls -la deploy/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
