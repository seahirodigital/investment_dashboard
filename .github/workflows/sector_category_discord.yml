name: Sector Category Discord Screenshots

on:
  schedule:
    # 平日 15:40 JST = 06:40 UTC。16:00 JST の ETF 日次更新より前に日本株版を送信する。
    - cron: '40 6 * * 1-5'
    # 米国市場引け後 06:25 JST = 21:25 UTC。06:30 JST までの米国株版到着を狙う。
    - cron: '25 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '通知モード'
        required: false
        default: 'jp'
        type: choice
        options:
          - jp
          - us

permissions:
  contents: read

jobs:
  send-sector-category:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          pip install pillow
          python -m playwright install --with-deps chromium

      - name: Capture sector category screenshots
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_DISPATCH_MODE: ${{ github.event.inputs.mode }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import time
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          from PIL import Image, ImageOps
          from playwright.sync_api import sync_playwright

          output_dir = Path('artifacts/sector_category_screenshots')
          output_dir.mkdir(parents=True, exist_ok=True)

          schedule = os.environ.get('GITHUB_EVENT_SCHEDULE', '')
          dispatch_mode = os.environ.get('WORKFLOW_DISPATCH_MODE', '')
          mode = dispatch_mode if dispatch_mode in {'jp', 'us'} else ('us' if schedule == '25 21 * * 1-5' else 'jp')
          (output_dir / 'mode.txt').write_text(mode, encoding='utf-8')

          page_url = 'http://127.0.0.1:8000/sector_category.html#full-sector-flow'
          card_selector = '[data-capture="full-sector-card"]'
          chart_selector = '[data-capture="full-sector-chart"]'
          ranking_selector = '[data-capture="full-sector-ranking"]'

          server = subprocess.Popen(['python', '-m', 'http.server', '8000'])
          time.sleep(2)
          try:
              with sync_playwright() as p:
                  browser = p.chromium.launch()
                  page = browser.new_page(viewport={"width": 1440, "height": 2200})
                  page.goto(page_url, wait_until='domcontentloaded', timeout=60000)
                  page.locator(card_selector).first.wait_for(state='visible', timeout=45000)
                  page.wait_for_timeout(8000)

                  card = page.locator(card_selector).first
                  if mode == 'us':
                      card.locator('[data-capture="market-us"]').click()
                      page.wait_for_function(
                          """() => document.querySelector('[data-capture="full-sector-card"]')?.dataset.market === 'us'""",
                          timeout=30000,
                      )
                      page.wait_for_timeout(5000)

                  chart = card.locator(chart_selector).first
                  chart.wait_for(state='visible', timeout=45000)
                  ranking = card.locator(ranking_selector).first
                  ranking.wait_for(state='visible', timeout=45000)
                  page.wait_for_function(
                      """() => document.querySelectorAll('[data-capture="full-sector-ranking"] .relative.group.h-8').length > 0""",
                      timeout=45000,
                  )

                  def scroll_ranking(position):
                      ranking.evaluate(
                          """(element, position) => {
                            const scroller = element.querySelector('.overflow-y-auto');
                            if (!scroller) return;
                            scroller.scrollTop = position === 'bottom' ? scroller.scrollHeight : 0;
                          }""",
                          position,
                      )

                  def combine(left_path, right_path, output_path):
                      left = Image.open(left_path).convert('RGB')
                      right = Image.open(right_path).convert('RGB')
                      if right.height != left.height:
                          if right.height < left.height:
                              right = ImageOps.pad(right, (right.width, left.height), color='white', centering=(0.5, 0.0))
                          else:
                              right = right.crop((0, 0, right.width, left.height))

                      gap = 18
                      canvas = Image.new('RGB', (left.width + gap + right.width, left.height), 'white')
                      canvas.paste(left, (0, 0))
                      canvas.paste(right, (left.width + gap, 0))
                      canvas.save(output_path)

                  def extract_ranking_items():
                      rows = ranking.evaluate(
                          """element => Array.from(element.querySelectorAll('.relative.group.h-8')).map(row => {
                            const nameEl = row.querySelector('[title]');
                            const perfEl = row.querySelector('.font-mono');
                            return {
                              name: (nameEl?.getAttribute('title') || nameEl?.textContent || '').trim(),
                              performance: (perfEl?.textContent || '').trim(),
                            };
                          }).filter(item => item.name && item.performance)"""
                      )
                      items = []
                      for row in rows:
                          performance = re.sub(r'\s+', '', row['performance'])
                          items.append({'name': row['name'], 'performance': performance})
                      return items

                  def write_jp_summary(items):
                      top_items = items[:5]
                      bottom_items = list(reversed(items[-5:]))
                      report_date = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y%m%d")

                      lines = [
                          f"{report_date} セクター資金流入割合分析",
                          "",
                          "▼上位5件",
                      ]
                      lines.extend(f"{item['name']}: {item['performance']}" for item in top_items)
                      lines.extend([
                          "",
                          "▼下位5件",
                      ])
                      lines.extend(f"{item['name']}: {item['performance']}" for item in bottom_items)
                      lines.extend([
                          "",
                          "#日経平均 #株式投資 #デイトレ #TOPIX #N225 #オプション #CFD",
                          "",
                          "https://seahirodigital.github.io/investment_dashboard/sector_category.html#full-sector-flow",
                          "https://seahirodigital.github.io/investment_dashboard/",
                      ])

                      (output_dir / 'discord_message.txt').write_text("\n".join(lines) + "\n", encoding="utf-8")

                  def write_us_summary(items):
                      top_items = items[:7]
                      bottom_items = list(reversed(items[-7:]))
                      report_date = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y%m%d")

                      lines = [
                          f"{report_date}の米国株各セクター資金流入",
                          "",
                          "▼上位7件",
                      ]
                      lines.extend(f"{item['name']}: {item['performance']}" for item in top_items)
                      lines.extend([
                          "",
                          "▼下位7件",
                      ])
                      lines.extend(f"{item['name']}: {item['performance']}" for item in bottom_items)
                      lines.extend([
                          "",
                          "#米国株 #株式投資 #デイトレ #オプション #FX",
                          "",
                          "https://seahirodigital.github.io/investment_dashboard/sector_category.html#full-sector-flow",
                      ])

                      (output_dir / 'discord_message.txt').write_text("\n".join(lines) + "\n", encoding="utf-8")

                  ranking_items = extract_ranking_items()
                  if mode == 'us':
                      write_us_summary(ranking_items)
                  else:
                      write_jp_summary(ranking_items)

                  prefix = 'us_sector_category' if mode == 'us' else 'sector_category'

                  card.locator('[data-capture="show-top7"]').click()
                  page.wait_for_timeout(2500)
                  scroll_ranking('top')
                  page.wait_for_timeout(500)
                  top_chart = output_dir / f'{prefix}_top7_chart.png'
                  top_ranking = output_dir / f'{prefix}_top7_ranking.png'
                  chart.screenshot(path=str(top_chart))
                  ranking.screenshot(path=str(top_ranking))
                  combine(
                      top_chart,
                      top_ranking,
                      output_dir / f'{prefix}_top7_with_ranking.png',
                  )

                  card.locator('[data-capture="show-bottom7"]').click()
                  page.wait_for_timeout(2500)
                  scroll_ranking('bottom')
                  page.wait_for_timeout(500)
                  bottom_chart = output_dir / f'{prefix}_bottom7_chart.png'
                  bottom_ranking = output_dir / f'{prefix}_bottom7_ranking.png'
                  chart.screenshot(path=str(bottom_chart))
                  ranking.screenshot(path=str(bottom_ranking))
                  combine(
                      bottom_chart,
                      bottom_ranking,
                      output_dir / f'{prefix}_bottom7_with_ranking.png',
                  )

                  if mode == 'jp':
                      ranking.evaluate(
                          """element => {
                            const scroller = element.querySelector('.overflow-y-auto');
                            if (scroller) {
                              scroller.style.overflow = 'visible';
                              scroller.style.height = 'auto';
                              scroller.style.maxHeight = 'none';
                            }
                            element.style.height = 'auto';
                            element.style.maxHeight = 'none';
                            element.style.overflow = 'visible';
                            let parent = element.parentElement;
                            for (let i = 0; i < 6 && parent; i += 1) {
                              parent.style.height = 'auto';
                              parent.style.maxHeight = 'none';
                              parent.style.overflow = 'visible';
                              parent = parent.parentElement;
                            }
                          }"""
                      )
                      page.wait_for_timeout(1000)
                      ranking.screenshot(path=str(output_dir / 'sector_category_full_ranking.png'))

                  browser.close()
          finally:
              server.terminate()
              server.wait(timeout=10)
          PY

      - name: Send sector category screenshots to Discord
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_OPTION_WEBHOOK_URL" ]; then
            echo "DISCORD_OPTION_WEBHOOK_URL secret is not set."
            exit 1
          fi

          MODE="$(cat artifacts/sector_category_screenshots/mode.txt)"

          if [ "$MODE" = "us" ]; then
            curl -sS -X POST "$DISCORD_OPTION_WEBHOOK_URL" \
              -F "content=<artifacts/sector_category_screenshots/discord_message.txt" \
              -F "files[0]=@artifacts/sector_category_screenshots/us_sector_category_top7_with_ranking.png" \
              -F "files[1]=@artifacts/sector_category_screenshots/us_sector_category_bottom7_with_ranking.png"
          else
            curl -sS -X POST "$DISCORD_OPTION_WEBHOOK_URL" \
              -F "content=<artifacts/sector_category_screenshots/discord_message.txt" \
              -F "files[0]=@artifacts/sector_category_screenshots/sector_category_top7_with_ranking.png" \
              -F "files[1]=@artifacts/sector_category_screenshots/sector_category_bottom7_with_ranking.png" \
              -F "files[2]=@artifacts/sector_category_screenshots/sector_category_full_ranking.png"
          fi
