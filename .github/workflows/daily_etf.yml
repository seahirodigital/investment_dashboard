name: Daily ETF Sector Analysis

on:
  schedule:
    - cron: '0 7 * * *'  # 16:00 JST (07:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch ETF Data
        run: |
          python scripts/etf_data_manager.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          [ -f data/etf_data.json ] && git add data/etf_data.json
          
          if ! git diff --staged --quiet; then
            git commit -m "Update ETF Data: $(date +'%Y-%m-%d')"
            git push
            echo "Data updated and pushed."
          else
            echo "No changes to commit."
          fi

      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          
          for file in index.html option.html etf.html teguchi.html data.json option_history.json advanced.html analytics.html history.csv trend.png sector_data.json; do
            if [ -f "$file" ]; then
              cp "$file" deploy/
              echo "✅ Copied $file to deploy/"
            else
              echo "⚠️ Warning: $file not found"
            fi
          done
          
          [ -d css ] && cp -r css deploy/
          [ -d js ] && cp -r js deploy/
          [ -d data ] && cp -r data deploy/
          
          echo "Deploy directory content:"
          ls -laR deploy/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
