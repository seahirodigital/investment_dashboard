name: 朝の市況Discord通知

on:
  schedule:
    # JST平日06:33 = UTC前日21:33
    - cron: '33 21 * * 0-4'
  workflow_dispatch:
    inputs:
      note_post_mode:
        description: 'note投稿モード'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - draft-note-only
          - dry-run
          - draft
          - skip
      note_date:
        description: 'note記事日付（空なら直近の米国市場日）'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  notify:
    name: Discordへ朝の市況を送信
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6.0.2

      - name: notion2noteを取得
        if: ${{ github.event_name == 'schedule' || github.event.inputs.note_post_mode != 'skip' }}
        uses: actions/checkout@v4
        with:
          repository: seahirodigital/notion2note
          path: _external/notion2note

      - name: Pythonを準備
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: |
          pip install -r requirements.txt
          if [ -d "_external/notion2note" ]; then
            pip install -r _external/notion2note/requirements.txt
            # note画像生成で動作確認済みのPlaywrightとChromiumを固定する。
            pip install 'playwright==1.60.0'
          fi
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f
          # GitHub Actions の Ubuntu イメージ側で Microsoft apt リポジトリが 403 になることがある。
          # Chromium の実行には不要なので、一時ランナー内だけで無効化して Playwright の依存導入を安定させる。
          while IFS= read -r source_file; do
            echo "不安定な Microsoft apt ソースを無効化します: $source_file"
            sudo rm -f "$source_file"
          done < <(grep -Rl "packages.microsoft.com" /etc/apt/sources.list.d 2>/dev/null || true)

          for attempt in 1 2 3; do
            if python -m playwright install --with-deps chromium; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Playwright Chromium のインストールが3回失敗しました。"
              exit 1
            fi
            echo "Playwright Chromium のインストールに失敗しました ($attempt/3)。15秒後に再試行します..."
            sleep 15
          done

          python -c "from playwright.sync_api import sync_playwright; pw = sync_playwright().start(); browser = pw.chromium.launch(); browser.close(); pw.stop(); print('Playwright Chromium の起動確認 OK')"

      - name: Tailscale経由でOCIへ接続
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: mooview-oci.taild87712.ts.net

      - name: 米国株資金フロー画像を撮影
        continue-on-error: true
        timeout-minutes: 4
        run: |
          python scripts/market/oci_mooview_screenshot.py \
            --base-url "https://mooview-oci.taild87712.ts.net" \
            --output-dir "artifacts/oci_mooview_capture" \
            --timeout-seconds "120" \
            --refresh-wait-seconds "10" \
            --viewport-width "1800" \
            --viewport-height "1000" \
            --probe-symbols "US.VOO,US.SPY"

      - name: 通知本文とスクリーンショットを作成して送信
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
          MOOVIEW_CAPTURE_DIR: artifacts/oci_mooview_capture
        run: python scripts/market/morning_discord_notification.py --send --keep-output --output-dir artifacts/morning_market_notification

      - name: 米国ETFデータを更新
        if: ${{ github.event_name == 'schedule' || github.event.inputs.note_post_mode != 'skip' }}
        env:
          MARKET_DATA_ALLOW_US_ONLY: '1'
        run: python scripts/market/etf_data_manager.py

      - name: 米国株セクターnote記事を投稿
        if: ${{ github.event_name == 'schedule' || github.event.inputs.note_post_mode != 'skip' }}
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
          NOTION2NOTE_DISCORD_WEBHOOK: ${{ secrets.NOTION2NOTE_DISCORD_WEBHOOK }}
          NOTE_POST_MODE: ${{ github.event_name == 'schedule' && 'publish' || github.event.inputs.note_post_mode }}
          NOTE_POST_DATE: ${{ github.event.inputs.note_date }}
          NOTE_PROJECT_DIR: ${{ github.workspace }}/_external/notion2note
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_STORAGE_SECRET_NAME: NOTE_STORAGE_STATE
          NOTE_PUBLISH_MAGAZINE_NAME: '米国株のニュース・動向まとめ'
          NOTE_AFFILIATE_MEMO: '1'
          NOTE_AFFILIATE_COUNT: '1'
          NOTE_AFFILIATE_SEED: ${{ github.run_id }}
          MORNING_MARKET_ASSETS_DIR: artifacts/morning_market_notification
          MOOVIEW_CAPTURE_DIR: artifacts/oci_mooview_capture
          # 外部Webフォントの読込不良でスクリーンショット全体が停止することを防ぐ。
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'
        run: |
          python note/us_sector_note_publisher.py \
            --mode "$NOTE_POST_MODE" \
            --date "$NOTE_POST_DATE" \
            --market-assets-dir "$MORNING_MARKET_ASSETS_DIR"

      - name: 米国株note生成物をアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: us-sector-note-generated-${{ github.run_id }}
          path: |
            artifacts/morning_market_notification
            note/generated/us_sector
          if-no-files-found: ignore
          retention-days: 7
