name: 朝の市況Discord通知

on:
  schedule:
    # JST平日06:33 = UTC前日21:33
    - cron: '33 21 * * 0-4'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Discordへ朝の市況を送信
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6.0.2

      - name: Pythonを準備
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: 通知本文とスクリーンショットを作成して送信
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
        run: python scripts/market/morning_discord_notification.py --send --output-dir artifacts/morning_market_notification
