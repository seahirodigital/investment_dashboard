name: Daily JPX Participant Analysis & NF Option Fetch

on:
  schedule:
    - cron: '45 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch JPX Data and Export JSON
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
        run: |
          python scripts/jpx/fetch_teguchi.py
          python scripts/jpx/fetch_option.py

      - name: Capture option charts
        run: |
          python - <<'PY'
          import os
          import subprocess
          import time
          from playwright.sync_api import sync_playwright

          os.makedirs('artifacts/option_screenshots', exist_ok=True)

          targets = [
              ('chartPurpose1_Diff', '01_major_option_diff.png'),
              ('chartPurpose1_Total', '02_major_option_total.png'),
              ('chartTrend', '03_major_option_trend.png'),
              ('chartPurpose2_225_OI', '04_n225_oi_by_strike.png'),
              ('chartPurpose2_225_Diff', '05_n225_diff_by_strike.png'),
          ]

          server = subprocess.Popen(['python', '-m', 'http.server', '8000'])
          time.sleep(2)
          try:
              with sync_playwright() as p:
                  browser = p.chromium.launch()
                  page = browser.new_page(viewport={"width": 1920, "height": 3000})
                  page.goto('http://127.0.0.1:8000/option.html?source=json&capture=1', wait_until='domcontentloaded', timeout=60000)
                  page.wait_for_function(
                      """() => window.optionChartsReady === true || Boolean(window.optionChartsError)""",
                      timeout=60000,
                  )
                  chart_error = page.evaluate("() => window.optionChartsError")
                  if chart_error:
                      raise RuntimeError(f"Option charts failed to render: {chart_error}")

                  def assert_canvas_has_content(element_id):
                      locator = page.locator(f'#{element_id}')
                      locator.wait_for(state='visible', timeout=30000)
                      has_content = locator.evaluate(
                          """canvas => {
                            const context = canvas.getContext('2d');
                            if (!context || canvas.width === 0 || canvas.height === 0) return false;
                            const image = context.getImageData(0, 0, canvas.width, canvas.height);
                            let paintedPixels = 0;
                            for (let index = 0; index < image.data.length; index += 4) {
                              const alpha = image.data[index + 3];
                              if (alpha === 0) continue;
                              const red = image.data[index];
                              const green = image.data[index + 1];
                              const blue = image.data[index + 2];
                              if (!(red > 248 && green > 248 && blue > 248)) {
                                paintedPixels += 1;
                                if (paintedPixels > 50) return true;
                              }
                            }
                            return false;
                          }"""
                      )
                      if not has_content:
                          raise RuntimeError(f"Canvas #{element_id} is blank or nearly blank.")
                      return locator

                  for element_id, file_name in targets:
                      locator = assert_canvas_has_content(element_id)
                      locator.screenshot(path=f'artifacts/option_screenshots/{file_name}')

                  browser.close()
          finally:
              server.terminate()
              server.wait(timeout=10)
          PY

      - name: Send option chart screenshots to Discord
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_OPTION_WEBHOOK_URL" ]; then
            echo "DISCORD_OPTION_WEBHOOK_URL secret is not set."
            exit 1
          fi

          python - <<'PY'
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          today = datetime.now(ZoneInfo("Asia/Tokyo")).strftime("%Y%m%d")
          lines = [
              f"{today}の日経225 オプション分析",
              "",
              "",
              "#日経平均 #株式投資 #デイトレ #N225 #オプション #CFD",
              "",
              "",
              "https://seahirodigital.github.io/investment_dashboard/option.html",
              "https://seahirodigital.github.io/investment_dashboard/",
          ]
          Path("artifacts/option_screenshots/discord_message.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          curl -sS -X POST "$DISCORD_OPTION_WEBHOOK_URL" \
            -F "content=<artifacts/option_screenshots/discord_message.txt" \
            -F "files[0]=@artifacts/option_screenshots/01_major_option_diff.png" \
            -F "files[1]=@artifacts/option_screenshots/02_major_option_total.png" \
            -F "files[2]=@artifacts/option_screenshots/03_major_option_trend.png" \
            -F "files[3]=@artifacts/option_screenshots/04_n225_oi_by_strike.png" \
            -F "files[4]=@artifacts/option_screenshots/05_n225_diff_by_strike.png"

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all modified json files
          [ -f data/teguchi.json ] && git add data/teguchi.json
          [ -f data/option_history.json ] && git add data/option_history.json
          
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "Update Daily Participant & Option Data: $(date +'%Y-%m-%d')"
            git push
            echo "Data updated and pushed."
          else
            echo "No changes to commit."
          fi

      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          
          for file in index.html option.html etf.html teguchi.html advanced.html analytics.html sector_category.html short_selling.html; do
            if [ -f "$file" ]; then
              cp "$file" deploy/
              echo "✅ Copied $file to deploy/"
            else
              echo "⚠️ Warning: $file not found"
            fi
          done
          
          [ -d css ] && cp -r css deploy/
          [ -d js ] && cp -r js deploy/
          [ -d data ] && cp -r data deploy/

          # keep_files: true なので gh-pages の既存ファイル（GPIF/dist等）は自動保持

          echo "Deploy directory content:"
          ls -laR deploy/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
