name: JPX Automation
on:
  push:
    branches:
      - main
    paths:
      # HTMLやCSS/JSの変更時のみデプロイ（データ更新コミットでは不要）
      - '*.html'
      - 'css/**'
      - 'js/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Debug mode (5 files only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 9 * * 4'  # 毎週木曜日 9:00 UTC (日本時間 18:00)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-and-save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium
      
      - name: Run Script
        env:
          DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        run: |
          # 1. JPXデータの取得 (history.csv生成)
          python main.py
          
          # 2. セクター分析データの生成 (sector_data.json生成)
          if [ -f history.csv ]; then
            python sector_manager.py
          else
            echo "Warning: history.csv not found, skipping sector analysis."
          fi
          
          # 3. GPIF分析データ取得
          python scripts/market/fetch_gpif_data.py
      
      - name: Check for changes
        id: check_changes
        run: |
          # 新規ファイル(sector_data.json等)も含めて全ての変更をステージングして確認
          git add -A
          
          # ステージングエリアに差分があるか確認
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Commit to main branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # すでに check_changes で git add -A しているので、ここではコミットのみ行う
          git commit -m "Update JPX & Sector data: $(date)"
          git pull --rebase origin main
          git push origin HEAD
      
      - name: GPIF React アプリのビルド
        run: |
          cd GPIF
          npm install --prefer-offline
          npm run build
          echo "✅ GPIF build 完了"
          ls dist/

      - name: Prepare deployment files
        run: |
          mkdir -p deploy

          # ファイルの存在確認とコピー（ログ出力付き）
          for file in index.html option.html etf.html teguchi.html advanced.html analytics.html sector_category.html short_selling.html; do
            if [ -f "$file" ]; then
              cp "$file" deploy/
              echo "✅ Copied $file to deploy/"
            else
              echo "⚠️ Warning: $file not found"
            fi
          done

          # フォルダコピー
          [ -d css ] && cp -r css deploy/
          [ -d js ] && cp -r js deploy/
          [ -d data ] && cp -r data deploy/

          # GPIFの静的ビルドファイルをデプロイ用にコピー
          mkdir -p deploy/GPIF
          [ -d GPIF/dist ] && cp -r GPIF/dist deploy/GPIF/
          # keep_files: true なので gh-pages の既存ファイル（GPIF/dist, etf_intraday.json）は自動保持
          
          echo "Deploy directory content:"
          ls -laR deploy/

      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true

      - name: Capture dashboard screenshots
        if: ${{ (github.event_name == 'schedule' && steps.check_changes.outputs.has_changes == 'true') || github.event_name == 'workflow_dispatch' }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import time
          from playwright.sync_api import sync_playwright

          os.makedirs('artifacts/dashboard_screenshots', exist_ok=True)

          targets = [
              {
                  'url': 'http://127.0.0.1:8000/index.html?view=jpx',
                  'selector': 'xpath=//h2[contains(., "差引推移")]/ancestor::div[contains(@class, "bg-white")][1]',
                  'file': 'foreign_investors_jpx_mof.png',
              },
              {
                  'url': 'http://127.0.0.1:8000/analytics.html',
                  'selector': '#chart-container',
                  'file': 'sector_sensitivity.png',
              },
          ]

          server = subprocess.Popen(['python', '-m', 'http.server', '8000'])
          time.sleep(2)
          try:
              with sync_playwright() as p:
                  browser = p.chromium.launch()
                  page = browser.new_page(viewport={"width": 1440, "height": 1600})

                  for target in targets:
                      page.goto(target['url'], wait_until='domcontentloaded', timeout=60000)
                      locator = page.locator(target['selector']).first
                      locator.wait_for(state='visible', timeout=45000)
                      page.wait_for_timeout(8000)
                      locator.screenshot(
                          path=f"artifacts/dashboard_screenshots/{target['file']}",
                      )

                  browser.close()
          finally:
              server.terminate()
              server.wait(timeout=10)
          PY

      - name: Send dashboard screenshots to Discord
        if: ${{ (github.event_name == 'schedule' && steps.check_changes.outputs.has_changes == 'true') || github.event_name == 'workflow_dispatch' }}
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_OPTION_WEBHOOK_URL" ]; then
            echo "DISCORD_OPTION_WEBHOOK_URL secret is not set."
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path

          lines = [
              "海外投資家動向（JPX・財務省） / セクター別感応度ページを更新しました。現状の最新データでスクリーンショットを送信します。",
              "",
              "海外投資家動向（JPX・財務省）",
              "https://seahirodigital.github.io/investment_dashboard/index.html?view=jpx",
              "https://seahirodigital.github.io/investment_dashboard/",
              "",
              "セクター別感応度ページ",
              "https://seahirodigital.github.io/investment_dashboard/analytics.html",
              "https://seahirodigital.github.io/investment_dashboard/",
          ]
          message = "\n".join(lines) + "\n"
          Path("artifacts/dashboard_screenshots/discord_message.txt").write_text(message, encoding="utf-8")
          PY

          curl -sS -X POST "$DISCORD_OPTION_WEBHOOK_URL" \
            -F "content=<artifacts/dashboard_screenshots/discord_message.txt" \
            -F "files[0]=@artifacts/dashboard_screenshots/foreign_investors_jpx_mof.png" \
            -F "files[1]=@artifacts/dashboard_screenshots/sector_sensitivity.png"
