name: OCI MooViewスクリーンショットデバッグ

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: '株価データとチャート描画を待つ最大秒数'
        required: false
        default: '600'
        type: string
      refresh_wait_seconds:
        description: '更新ボタンを押した後に待つ秒数'
        required: false
        default: '10'
        type: string
      viewport_width:
        description: '撮影するブラウザーの横幅'
        required: false
        default: '1800'
        type: string
      viewport_height:
        description: '撮影するブラウザーの高さ'
        required: false
        default: '1000'
        type: string
  # 初回のActions疎通確認用。確認完了後に削除する。
  push:
    branches:
      - codex/oci-mooview-screenshot
    paths:
      - '.github/workflows/oci_mooview_screenshot_debug.yml'
      - 'scripts/market/oci_mooview_screenshot.py'

permissions:
  contents: read
  id-token: write

jobs:
  capture:
    name: OCI接続・実データ待機・画面撮影
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MOOVIEW_BASE_URL: https://mooview-oci.taild87712.ts.net
      SCREENSHOT_OUTPUT_DIR: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6.0.2

      - name: Tailscale経由でOCIへ接続
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: mooview-oci.taild87712.ts.net

      - name: Pythonを準備
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: 日本語フォントを準備
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Playwrightを準備
        run: |
          python -m pip install 'requests>=2.31.0' 'playwright==1.60.0'
          python -m playwright install chromium

      - name: OCIの実データ取得を待って撮影
        env:
          CAPTURE_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '600' }}
          CAPTURE_REFRESH_WAIT_SECONDS: ${{ github.event.inputs.refresh_wait_seconds || '10' }}
          CAPTURE_VIEWPORT_WIDTH: ${{ github.event.inputs.viewport_width || '1800' }}
          CAPTURE_VIEWPORT_HEIGHT: ${{ github.event.inputs.viewport_height || '1000' }}
        run: |
          python /home/runner/work/investment_dashboard/investment_dashboard/scripts/market/oci_mooview_screenshot.py \
            --base-url "$MOOVIEW_BASE_URL" \
            --output-dir "$SCREENSHOT_OUTPUT_DIR" \
            --timeout-seconds "$CAPTURE_TIMEOUT_SECONDS" \
            --refresh-wait-seconds "$CAPTURE_REFRESH_WAIT_SECONDS" \
            --viewport-width "$CAPTURE_VIEWPORT_WIDTH" \
            --viewport-height "$CAPTURE_VIEWPORT_HEIGHT"

      - name: 撮影画像と診断結果を保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-mooview-screenshot-${{ github.run_id }}
          path: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture
          if-no-files-found: warn
          retention-days: 7
