name: OCI MooViewスクリーンショットデバッグ

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: '株価データとチャート描画を待つ最大秒数'
        required: false
        default: '600'
        type: string
      refresh_wait_seconds:
        description: '更新ボタンを押した後に待つ秒数'
        required: false
        default: '10'
        type: string
      viewport_width:
        description: '撮影するブラウザーの横幅'
        required: false
        default: '1800'
        type: string
      viewport_height:
        description: '撮影するブラウザーの高さ'
        required: false
        default: '1000'
        type: string
      weekend_publish_test:
        description: '週末まとめをnoteへ公開投稿しDiscordへ通知する'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      note_date:
        description: '週末まとめの配信日（空なら実行日）'
        required: false
        default: ''
        type: string
      reuse_capture_run_id:
        description: '再利用する成功済み撮影run ID（空なら新規撮影）'
        required: false
        default: ''
        type: string
      reuse_nikkei_run_id:
        description: '日経225ヒートマップを再利用する日次run ID'
        required: false
        default: ''
        type: string
  # 初回のActions疎通確認用。確認完了後に削除する。
  push:
    branches:
      - codex/oci-mooview-screenshot
    paths:
      - '.github/workflows/oci_mooview_screenshot_debug.yml'
      - 'scripts/market/oci_mooview_screenshot.py'

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  capture:
    name: OCI接続・実データ待機・画面撮影
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MOOVIEW_BASE_URL: https://mooview-oci.taild87712.ts.net
      SCREENSHOT_OUTPUT_DIR: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6.0.2

      - name: notion2noteを取得
        if: ${{ github.event.inputs.weekend_publish_test == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: seahirodigital/notion2note
          path: _external/notion2note

      - name: Tailscale経由でOCIへ接続
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: mooview-oci.taild87712.ts.net

      - name: Pythonを準備
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: 日本語フォントを準備
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Playwrightを準備
        run: |
          python -m pip install 'requests>=2.31.0' 'playwright==1.60.0'
          python -m playwright install chromium

      - name: 公開テスト用の依存関係を準備
        if: ${{ github.event.inputs.weekend_publish_test == 'true' }}
        run: |
          pip install -r /home/runner/work/investment_dashboard/investment_dashboard/requirements.txt
          pip install -r /home/runner/work/investment_dashboard/investment_dashboard/_external/notion2note/requirements.txt

      - name: 成功済みの週次撮影成果物を再利用
        if: ${{ github.event.inputs.weekend_publish_test == 'true' && github.event.inputs.reuse_capture_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: oci-mooview-screenshot-${{ github.event.inputs.reuse_capture_run_id }}
          path: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.reuse_capture_run_id }}

      - name: 既存日次Actionの日経225ヒートマップを再利用
        if: ${{ github.event.inputs.weekend_publish_test == 'true' && github.event.inputs.reuse_nikkei_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: note-blog-generated-${{ github.event.inputs.reuse_nikkei_run_id }}
          path: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/latest_daily_note
          github-token: ${{ github.token }}
          run-id: ${{ github.event.inputs.reuse_nikkei_run_id }}

      - name: OCIの実データ取得を待って撮影
        if: ${{ github.event.inputs.reuse_capture_run_id == '' }}
        env:
          CAPTURE_TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '600' }}
          CAPTURE_REFRESH_WAIT_SECONDS: ${{ github.event.inputs.refresh_wait_seconds || '10' }}
          CAPTURE_VIEWPORT_WIDTH: ${{ github.event.inputs.viewport_width || '1800' }}
          CAPTURE_VIEWPORT_HEIGHT: ${{ github.event.inputs.viewport_height || '1000' }}
        run: |
          python /home/runner/work/investment_dashboard/investment_dashboard/scripts/market/oci_mooview_screenshot.py \
            --base-url "$MOOVIEW_BASE_URL" \
            --output-dir "$SCREENSHOT_OUTPUT_DIR" \
            --timeout-seconds "$CAPTURE_TIMEOUT_SECONDS" \
            --refresh-wait-seconds "$CAPTURE_REFRESH_WAIT_SECONDS" \
            --display-range "${{ github.event.inputs.weekend_publish_test == 'true' && 'w' || 'd' }}" \
            --viewport-width "$CAPTURE_VIEWPORT_WIDTH" \
            --viewport-height "$CAPTURE_VIEWPORT_HEIGHT"

      - name: 週末まとめをnoteへ公開してDiscordへ通知
        if: ${{ github.event.inputs.weekend_publish_test == 'true' }}
        env:
          DISCORD_OPTION_WEBHOOK_URL: ${{ secrets.DISCORD_OPTION_WEBHOOK_URL }}
          NOTION2NOTE_DISCORD_WEBHOOK: ${{ secrets.NOTION2NOTE_DISCORD_WEBHOOK }}
          NOTE_POST_MODE: publish
          NOTE_POST_DATE: ${{ github.event.inputs.note_date }}
          NOTE_PROJECT_DIR: /home/runner/work/investment_dashboard/investment_dashboard/_external/notion2note
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}
          NOTE_STORAGE_SECRET_NAME: NOTE_STORAGE_STATE
          NOTE_PUBLISH_MAGAZINE_NAME: '日本株の振り返りまとめ '
          NOTE_AFFILIATE_MEMO: '1'
          NOTE_AFFILIATE_COUNT: '1'
          NOTE_AFFILIATE_SEED: ${{ github.run_id }}
          MOOVIEW_CAPTURE_DIR: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture
          WEEKEND_NIKKEI_HEATMAP_DIR: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/latest_daily_note
          PW_TEST_SCREENSHOT_NO_FONTS_READY: '1'
        run: |
          python /home/runner/work/investment_dashboard/investment_dashboard/note/weekend_market_note_publisher.py \
            --mode publish \
            --date "$NOTE_POST_DATE" \
            --mooview-assets-dir "$MOOVIEW_CAPTURE_DIR"

      - name: 撮影画像と診断結果を保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-mooview-screenshot-${{ github.run_id }}
          path: /home/runner/work/investment_dashboard/investment_dashboard/artifacts/oci_mooview_capture
          if-no-files-found: warn
          retention-days: 7
