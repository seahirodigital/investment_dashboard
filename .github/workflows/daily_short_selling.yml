name: Daily Short Selling Data Fetch

on:
  schedule:
    - cron: '5 8 * * 1-5'  # 毎営業日 08:05 UTC (17:05 JST)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-short-selling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Short Selling Data
        run: python scripts/jpx/fetch_short_selling.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          [ -f data/short_selling.json ] && git add data/short_selling.json

          if ! git diff --staged --quiet; then
            git commit -m "Update Short Selling Data: $(date +'%Y-%m-%d')"
            git push
            echo "Data updated and pushed."
          else
            echo "No changes to commit."
          fi

      - name: Prepare deployment files
        run: |
          mkdir -p deploy

          for file in index.html option.html etf.html teguchi.html advanced.html analytics.html sector_category.html short_selling.html; do
            if [ -f "$file" ]; then
              cp "$file" deploy/
              echo "Copied $file to deploy/"
            else
              echo "Warning: $file not found"
            fi
          done

          [ -d css ] && cp -r css deploy/
          [ -d js ] && cp -r js deploy/
          [ -d data ] && cp -r data deploy/

          echo "Deploy directory content:"
          ls -laR deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
